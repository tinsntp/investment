<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Chart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; color: #fff; overflow: hidden; }
  body { position: relative; }
  #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 2vw; color: rgba(255,255,255,0.5); text-align: center; line-height: 2; white-space: pre-line; }
  #chart-wrap { position: absolute; bottom: 3vw; left: 0; right: 0; padding: 0 4vw; display: none; }
  .baseline { position: absolute; left: 0; right: 0; height: 1.5px; background: rgba(255,255,255,0.25); }
  .bar-value { font-size: 2.4vw; font-weight: 400; color: #fff; white-space: nowrap; text-align: center; width: 100%; line-height: 1; }
  .bar-name { font-size: 2.2vw; color: rgba(255,255,255,0.75); text-align: center; white-space: pre-line; line-height: 1.3; }
</style>
</head>
<body>

<div id="status">Loading…</div>
<div id="chart-wrap"><div id="chart-inner" style="position:relative;width:100%;"></div></div>

<script>
  const CSV_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQnzbOhfKNO_niIpBIoReyDiy5p-UdXvtO6SIMNKXrZts9Cax9hR_5F7RqB_uejrjZuyV6N-Pjc08kd/pub?output=csv`;

  const COLOR_NEG = '#c8c8c8';
  const COLOR_POS = '#4DB6AC';

  function fmt(v) {
    const a = Math.abs(v);
    let s = a >= 1e6 ? (a/1e6).toFixed(1).replace(/\.0$/,'')+'M'
          : a >= 1e3 ? (a/1e3).toFixed(0)+'K'
          : String(a);
    return (v < 0 ? '−' : '') + s;
  }

  function setStatus(msg) {
    const el = document.getElementById('status');
    el.style.display = 'block';
    el.textContent = msg;
  }

  // Robust CSV row splitter (handles quoted fields with commas inside)
  function splitCSVRow(row) {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < row.length; i++) {
      const ch = row[i];
      if (ch === '"') {
        inQ = !inQ;
      } else if (ch === ',' && !inQ) {
        cols.push(cur); cur = '';
      } else {
        cur += ch;
      }
    }
    cols.push(cur);
    return cols;
  }

  // Parse number — handles "−9,600,000" / "-9600000" / "(9600000)" accounting format
  function parseNum(str) {
    if (!str) return NaN;
    let s = str.trim();
    // accounting negative: (1234) → -1234
    const isAccounting = /^\(.*\)$/.test(s);
    if (isAccounting) s = '-' + s.slice(1, -1);
    // replace all unicode minus / en-dash with ASCII minus
    s = s.replace(/[\u2212\u2013\u2014]/g, '-');
    // remove everything except digits, dot, minus
    s = s.replace(/[^0-9.\-]/g, '');
    return parseFloat(s);
  }

  async function fetchData() {
    const url = CSV_URL + '&t=' + Date.now();
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const text = await r.text();

    const rows = text.trim().split('\n').slice(1); // skip header
    const data = rows.map(row => {
      const cols = splitCSVRow(row);
      const name = cols[0].replace(/^"|"$/g, '').trim();
      const val  = parseNum(cols[1]);
      return { name, val };
    }).filter(d => d.name && !isNaN(d.val));

    if (!data.length) throw new Error('No valid data rows found.\nCheck columns A (name) and B (number) in your sheet.');
    return data;
  }

  function render(data) {
    const inner = document.getElementById('chart-inner');
    inner.innerHTML = '';

    const W         = window.innerWidth;
    const chartH    = W * 0.40;
    const baselineY = chartH * 0.46;
    const offset    = W * 0.008;

    inner.style.height = chartH + 'px';

    // baseline rule
    const bl = document.createElement('div');
    bl.className = 'baseline';
    bl.style.top = baselineY + 'px';
    inner.appendChild(bl);

    const maxAbs = Math.max(...data.map(d => Math.abs(d.val)));
    const n      = data.length;
    const gapVw  = 2;

    data.forEach(({ name, val }, i) => {
      const isPos = val >= 0;
      const barH  = (Math.abs(val) / maxAbs) * baselineY * 0.92;
      const color = isPos ? COLOR_POS : COLOR_NEG;

      const col = document.createElement('div');
      col.style.cssText = `
        position: absolute;
        top: 0;
        height: ${chartH}px;
        width: calc((100% - ${(n - 1) * gapVw}vw) / ${n});
        left: calc(${i} * ((100% - ${(n - 1) * gapVw}vw) / ${n} + ${gapVw}vw));
      `;

      if (isPos) {
        // value label above bar
        const valEl = document.createElement('div');
        valEl.className = 'bar-value';
        valEl.textContent = fmt(val);
        valEl.style.cssText = `position:absolute; bottom:${chartH - baselineY + barH + offset}px;`;

        // bar grows upward from baseline
        const rect = document.createElement('div');
        rect.style.cssText = `
          position: absolute; width: 100%;
          bottom: ${chartH - baselineY}px;
          height: ${barH}px;
          background: ${color};
          border-radius: 2px 2px 0 0;
        `;

        // name below baseline
        const nameEl = document.createElement('div');
        nameEl.className = 'bar-name';
        nameEl.textContent = name;
        nameEl.style.cssText = `position:absolute; top:${baselineY + offset}px; width:100%;`;

        col.append(valEl, rect, nameEl);

      } else {
        // name above baseline
        const nameEl = document.createElement('div');
        nameEl.className = 'bar-name';
        nameEl.textContent = name;
        nameEl.style.cssText = `position:absolute; bottom:${chartH - baselineY + offset}px; width:100%;`;

        // bar grows downward from baseline
        const rect = document.createElement('div');
        rect.style.cssText = `
          position: absolute; width: 100%;
          top: ${baselineY}px;
          height: ${barH}px;
          background: ${color};
          border-radius: 0 0 2px 2px;
        `;

        // value label below bar
        const valEl = document.createElement('div');
        valEl.className = 'bar-value';
        valEl.textContent = fmt(val);
        valEl.style.cssText = `position:absolute; top:${baselineY + barH + offset}px;`;

        col.append(nameEl, rect, valEl);
      }

      inner.appendChild(col);
    });

    document.getElementById('status').style.display = 'none';
    document.getElementById('chart-wrap').style.display = 'block';
  }

  async function load() {
    setStatus('Loading…');
    try {
      const data = await fetchData();
      render(data);
    } catch (e) {
      setStatus(`⚠ Failed to load data\n${e.message}`);
    }
  }

  load();
  setInterval(load, 60000);
</script>
</body>
</html>
