<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashflow Bars</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    color: #fff;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 3vw 3vw;
    gap: 5vw;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 2vw;
  }

  /* arrow toggle (decorative) */
  .arrow {
    width: 2.2vw;
    height: 2.2vw;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.5;
  }

  .arrow svg { width: 100%; height: 100%; }

  /* pill label */
  .pill {
    display: flex;
    align-items: center;
    gap: 1vw;
    padding: 0.8vw 1.6vw;
    border-radius: 0.7vw;
    flex-shrink: 0;
    min-width: 26vw;
  }

  .pill-dot {
    width: 1.8vw;
    height: 1.8vw;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .pill-label {
    font-size: 3.2vw;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
  }

  /* bar track */
  .bar-track {
    flex: 0 1 35vw;
    height: 2.8vw;
    background: rgba(255,255,255,0.08);
    border-radius: 0.4vw;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    border-radius: 0.4vw;
    transition: width 0.6s ease;
  }

  /* value */
  .bar-val {
    flex-shrink: 0;
    font-size: 3.2vw;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
    min-width: 22vw;
    text-align: right;
    white-space: nowrap;
  }

  #status {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 1.8vw;
    color: rgba(255,255,255,0.4);
    text-align: center;
    white-space: pre-line;
  }
</style>
</head>
<body>

<div id="status">Loading…</div>
<div id="bars"></div>

<script>
  // Tab 2 = gid 856261893 — change if your second sheet has a different gid
  // To find the gid: open the sheet tab, look at the URL: ...#gid=XXXXXXX
  const CSV_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQnzbOhfKNO_niIpBIoReyDiy5p-UdXvtO6SIMNKXrZts9Cax9hR_5F7RqB_uejrjZuyV6N-Pjc08kd/pub?output=csv&gid=1324702331`;

  // Row colours matching screenshot: green, red/pink, deeper red
  const COLORS = [
    { bg: '#1a3a2a', dot: '#2ECC71', bar: '#2ECC71' },
    { bg: '#3a1a1a', dot: '#E74C3C', bar: '#E74C3C' },
    { bg: '#4a1a2a', dot: '#C0392B', bar: '#C0392B' },
  ];

  function fmt(v) {
    const a = Math.abs(v);
    let s = a >= 1e6 ? (a/1e6).toFixed(1).replace(/\.0$/,'')+'M'
          : a >= 1e3 ? Math.round(a/1e3)+'K'
          : String(Math.round(a));
    return (v < 0 ? '−' : '') + 'đ' + s;
  }

  function splitCSVRow(row) {
    const cols = []; let cur = '', inQ = false;
    for (const ch of row) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += ch;
    }
    cols.push(cur);
    return cols;
  }

  function parseNum(str) {
    if (!str) return NaN;
    let s = str.trim();
    if (/^\(.*\)$/.test(s)) s = '-' + s.slice(1,-1);
    s = s.replace(/[\u2212\u2013\u2014]/g, '-').replace(/[^0-9.\-]/g, '');
    return parseFloat(s);
  }

  async function load() {
    try {
      const r = await fetch(CSV_URL + '&t=' + Date.now(), { cache: 'no-store' });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const text = await r.text();
      const rows = text.trim().split('\n').filter(r => r.trim().length > 0);
      const data = rows.map(row => {
        const cols = splitCSVRow(row);
        return {
          name: cols[0].replace(/^"|"$/g,'').trim(),
          val:  parseNum(cols[1])
        };
      }).filter(d => d.name.length > 0 && !isNaN(d.val));

      if (!data.length) throw new Error('No data in sheet tab 2.\nCheck gid= in the URL.');
      render(data);
    } catch(e) {
      const st = document.getElementById('status');
      if (st) { st.style.display = 'block'; st.textContent = `⚠ ${e.message}`; }
      else { document.getElementById('bars').innerHTML = `<div style="color:rgba(255,255,255,0.4);font-size:1.8vw;text-align:center;padding:2vw">⚠ ${e.message}</div>`; }
    }
  }

  function render(data) {
    document.getElementById('status').style.display = 'none';
    document.getElementById('bars').innerHTML = '';

    const maxAbs = Math.max(...data.map(d => Math.abs(d.val)));

    data.forEach(({ name, val }, i) => {
      const c       = COLORS[i % COLORS.length];
      const pct     = (Math.abs(val) / maxAbs * 100).toFixed(1);
      const isPos   = val >= 0;

      const row = document.createElement('div');
      row.className = 'row';

      // arrow
      row.innerHTML += `
        <div class="arrow">
          <svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="3,2 8,5 3,8" fill="rgba(255,255,255,0.5)"/>
          </svg>
        </div>`;

      // pill
      const pill = document.createElement('div');
      pill.className = 'pill';
      pill.style.background = c.bg;
      pill.innerHTML = `
        <div class="pill-dot" style="background:${c.dot}; ${isPos ? '' : 'border-radius:2px;'}"></div>
        <span class="pill-label">${name}</span>
      `;
      // dot shape: circle for positive, minus-bar for negative
      if (!isPos) pill.querySelector('.pill-dot').style.borderRadius = '2px';
      row.appendChild(pill);

      // bar track
      const track = document.createElement('div');
      track.className = 'bar-track';
      const fill = document.createElement('div');
      fill.className = 'bar-fill';
      fill.style.width = pct + '%';
      fill.style.background = c.bar;
      fill.style.opacity = isPos ? '0.9' : '0.6';
      track.appendChild(fill);
      row.appendChild(track);

      // value
      const valEl = document.createElement('div');
      valEl.className = 'bar-val';
      valEl.textContent = fmt(val);
      row.appendChild(valEl);

      document.getElementById('bars').appendChild(row);
    });
  }

  load();
  setInterval(load, 60000);
</script>
</body>
</html>
