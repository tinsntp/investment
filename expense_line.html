<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashflow Bars</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    color: #fff;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 3vw 3vw;
  }

  .row {
    display: grid;
    grid-template-columns: 2.2vw 28vw 9vw 1vw auto;
    align-items: center;
    gap: 2vw;
    margin-bottom: 4vw;
  }
  .row:last-child { margin-bottom: 0; }

  /* arrow */
  .arrow {
    width: 2.2vw; height: 2.2vw;
    flex-shrink: 0;
    opacity: 0.45;
  }

  /* pill label */
  .pill {
    display: flex;
    align-items: center;
    padding: 0.8vw 1.6vw;
    border-radius: 1.4vw;
  }



  .pill-label {
    font-size: 4vw;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
  }

  /* donut ring */
  .ring-wrap {
    width: 9vw;
    height: 9vw;
  }

  .ring-wrap svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  /* value */
  .bar-val {
    font-size: 4.2vw;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
    white-space: nowrap;
  }

  #status {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 1.8vw;
    color: rgba(255,255,255,0.4);
    text-align: center;
    white-space: pre-line;
  }
</style>
</head>
<body>

<div id="status">Loading…</div>
<div id="bars"></div>

<script>
  const CSV_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQnzbOhfKNO_niIpBIoReyDiy5p-UdXvtO6SIMNKXrZts9Cax9hR_5F7RqB_uejrjZuyV6N-Pjc08kd/pub?output=csv&gid=1324702331`;

  const COLORS = [
    { bg: '#1a3a2a', dot: '#2ECC71', ring: '#2ECC71' },
    { bg: '#3a1a1a', dot: '#E74C3C', ring: '#E74C3C' },
    { bg: '#4a1a2a', dot: '#C0392B', ring: '#C0392B' },
  ];

  function fmt(v) {
    const a = Math.abs(v);
    return (v < 0 ? '−' : '') + 'đ' + Math.round(a).toLocaleString('en-US');
  }

  function splitCSVRow(row) {
    const cols = []; let cur = '', inQ = false;
    for (const ch of row) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += ch;
    }
    cols.push(cur);
    return cols;
  }

  function parseNum(str) {
    if (!str) return NaN;
    let s = str.trim();
    if (/^\(.*\)$/.test(s)) s = '-' + s.slice(1,-1);
    s = s.replace(/[\u2212\u2013\u2014]/g, '-').replace(/[^0-9.\-]/g, '');
    return parseFloat(s);
  }

  function makeRing(pct, color) {
    const r   = 40;
    const cx  = 50, cy = 50;
    const circ = 2 * Math.PI * r;
    const dash = (pct / 100) * circ;
    return `
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- track -->
        <circle cx="${cx}" cy="${cy}" r="${r}"
          fill="none"
          stroke="rgba(255,255,255,0.12)"
          stroke-width="10"/>
        <!-- progress -->
        <circle cx="${cx}" cy="${cy}" r="${r}"
          fill="none"
          stroke="${color}"
          stroke-width="10"
          stroke-linecap="round"
          stroke-dasharray="${dash} ${circ}"
          stroke-dashoffset="0"/>
      </svg>`;
  }

  async function load() {
    try {
      const r = await fetch(CSV_URL + '&t=' + Date.now(), { cache: 'no-store' });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const text = await r.text();
      const rows = text.trim().split('\n').filter(r => r.trim().length > 0);
      const data = rows.map(row => {
        const cols = splitCSVRow(row);
        return { name: cols[0].replace(/^"|"$/g,'').trim(), val: parseNum(cols[1]) };
      }).filter(d => d.name.length > 0 && !isNaN(d.val));

      if (!data.length) throw new Error('No data found.\nCheck sheet gid and column layout.');
      render(data);
    } catch(e) {
      const st = document.getElementById('status');
      if (st) { st.style.display = 'block'; st.textContent = `⚠ ${e.message}`; }
      else { document.getElementById('bars').innerHTML = `<div style="color:rgba(255,255,255,0.4);font-size:1.8vw;text-align:center;padding:2vw">⚠ ${e.message}</div>`; }
    }
  }

  function render(data) {
    document.getElementById('status').style.display = 'none';
    document.getElementById('bars').innerHTML = '';
    const maxAbs = Math.max(...data.map(d => Math.abs(d.val)));

    data.forEach(({ name, val }, i) => {
      const c   = COLORS[i % COLORS.length];
      const pct = Math.abs(val) / maxAbs * 100;

      const row = document.createElement('div');
      row.className = 'row';

      // arrow
      row.innerHTML = `
        <svg class="arrow" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="3,2 8,5 3,8" fill="rgba(255,255,255,0.5)"/>
        </svg>`;

      // pill
      const pill = document.createElement('div');
      pill.className = 'pill';
      pill.style.background = c.bg;
      pill.innerHTML = `<span class="pill-label">${name}</span>`;
      row.appendChild(pill);

      // donut ring
      const ringWrap = document.createElement('div');
      ringWrap.className = 'ring-wrap';
      ringWrap.innerHTML = makeRing(pct, c.ring);
      row.appendChild(ringWrap);

      // value
      const valEl = document.createElement('div');
      valEl.className = 'bar-val';
      valEl.textContent = fmt(val);
      row.appendChild(valEl);

      document.getElementById('bars').appendChild(row);
    });
  }

  load();
  setInterval(load, 60000);
</script>
</body>
</html>
