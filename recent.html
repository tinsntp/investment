<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  width:100%; height:100%;
  background:#191919;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  color:#fff; overflow:hidden;margin-top:15px;display: flex;
  flex-direction: column;
}

/* ── Tab bar ── */
.tab-bar {
  display:flex; align-items:stretch;
  border-bottom:1px solid rgba(255,255,255,0.1);
  position:relative; flex-shrink:0; padding:0 0vw;
}
.tab-btn {
  flex:1; display:flex; align-items:center; justify-content:center;
  gap:1.5vw; cursor:pointer; user-select:none;
  font-size:3vw; font-weight:600; color:rgba(255,255,255,0.4); transition:color 0.2s;
}
.tab-btn.active { color:#fff; }
.tab-btn img { width:5vw; height:5vw; object-fit:contain; opacity:0.4; transition:opacity 0.2s; }
.tab-btn.active img { opacity:1; }
.tab-line {
  position:absolute; bottom:0; height:2.5px; background:#fff; border-radius:2px;
  transition:left 0.25s ease, width 0.25s ease;
}
#tab-btn-2 { display:flex; }
/* ── 🟢 Mobile Layout (iPhone & Small Viewports) ── */
@media (max-width: 401px) {
  /* Hide the text names inside all tabs by default */
  .tab-btn span {
    display: none;
  }

  /* Force the text name to show up ONLY if the tab is selected/active */
  .tab-btn.active span {
    display: inline-block; /* Or 'block' depending on your alignment layout */
    margin-left: 6px;      /* Adds nice spacing right next to the active icon */
    font-size: 15px;       /* Keeps it neat and compact for narrow displays */
  }
}

/* ── Slides ── */
.slides-outer { flex:1; overflow:hidden; position:relative; }
.slides-wrap { display:flex; width:400%; height:100%; transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); }
.slide { width:25%; height:100%; overflow-y:auto; overflow-x:hidden; padding:0vw; flex-shrink:0; }

/* ══ DETAIL STYLES ══ */
#rings-wrap {
  display:flex; flex-wrap:wrap; gap:1.5vw;
  justify-content:space-around; margin-bottom:1.5vw;
}
.ring-item {
  display:flex; flex-direction:column; align-items:center; gap:0.6vw; flex:1;
  cursor:pointer; border-radius:2vw; padding:1.5vw 0.5vw; transition:background 0.2s;
}
.ring-item:hover { background:rgba(255,255,255,0.04); }
.ring-item.selected { background:rgba(255,255,255,0.04); }
.ring-icon { width:4vw; height:4vw; object-fit:contain; border-radius:50%; margin-top:0.5vw; }
.ring-icon-fb { width:4vw; height:4vw; margin-top:0.5vw; }
.ring-svg { flex-shrink:0; }
.ring-label { font-size:2.2vw; color:rgba(255,255,255,0.7); text-align:center; line-height:1.3; font-weight:600; white-space:normal; word-break:break-word; }
.ring-remain { font-size:2vw; font-weight:700; text-align:center; white-space:normal; }
.ring-remain.ok   { color:#14b8a6; }   /* teal */
.ring-remain.low  { color:#fbbf24; }   /* keep yellow */
.ring-remain.over { color:#FF69B4; }   /* pink */

.det-col-hdr{display:grid;grid-template-columns:5fr 2fr 2fr 1.6fr;padding:0.8vw 0.5vw;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:0.5vw;font-size:1.9vw;font-weight:600;color:rgba(255,255,255,0.35)}
.det-col-hdr .ch{text-align:right}
.det-col-hdr .ch:first-child{text-align:left}
.expand-txt{display:block;text-align:right;font-size:2.2vw;font-weight:600;color:rgba(255,255,255,0.75);border-radius:4vw;cursor:pointer;margin-top:5px;margin-bottom:2.5vw;background:rgba(255,255,255,0.08);border:0px solid rgba(255,255,255,0.25);padding:1vw 2.5vw}
.expand-txt:hover{color:#fff;background:rgba(255,255,255,0.1)}
#cat-list{display:flex;flex-direction:column}
.cat-row{display:grid;grid-template-columns:5fr 2fr 2fr 1.6fr;align-items:center;gap:1vw;padding:1.4vw 0.5vw;border-bottom:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:background 0.15s}
.cat-row:last-child { border-bottom:none; }
.cat-row:hover { background:rgba(255,255,255,0.04); border-radius:0vw; }
.cat-row.ring-highlighted { background:rgba(255,255,255,0.04); border-radius:0vw; }
.cat-row.sub-row { display:none; }
.cat-row.sub-row.visible { display:grid; }

.name-cell { display:flex; align-items:center; gap:1.5vw; min-width:0; overflow:hidden; }
.sub-row .name-cell { padding-left:6vw; }
.chevron { font-size:3.5vw; color:rgba(255,255,255,0.45); flex-shrink:0; user-select:none; line-height:1; }
.cat-ico { width:5vw; height:5vw; border-radius:50%; object-fit:contain; flex-shrink:0; background:rgba(255,255,255,0.08); padding:0.5vw; }
.cat-ico-fb { width:5vw; height:5vw; border-radius:50%; flex-shrink:0; background:rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:2.3vw; color:rgba(255,255,255,0.6); }
.sub-row .cat-ico, .sub-row .cat-ico-fb { width:4vw; height:4vw; }
.cat-name { font-size:2.8vw; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sub-row .cat-name { font-size:2.4vw; font-weight:500; color:rgba(255,255,255,0.75); }
.amt-val { font-size:2.5vw; font-weight:700; color:#fff; text-align:right; white-space:nowrap; }
.sub-row .amt-val { font-size:2.2vw; font-weight:500; }
.last-val { font-size:2.2vw; color:rgba(255,255,255,0.4); text-align:right; white-space:nowrap; }
.pct-val { font-size:2.2vw; font-weight:600; text-align:right; white-space:nowrap; }
.pct-val.up { color:#FF69B4; }
.pct-val.down { color:#14b8a6; }
.pct-val.flat { color:rgba(255,255,255,0.3); }
#det-msg { font-size:3vw; color:rgba(255,255,255,0.4); text-align:center; padding:5vw; }

.budget-card{margin-top:15px;padding:10px;}
.budget-title,.budget-label{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:2px}
.budget-total,#budget-spent,.marker-value,#budget-remaining{font-family:monospace}
.budget-total{font-size:18px;font-weight:500;color:rgba(255,255,255,.85);margin-bottom:16px}
.budget-bar-wrap{position:relative;margin-bottom:10px}
.budget-bar{position:relative;width:100%;height:7px;background:#505867;border-radius:999px;overflow:hidden}
#budget-fill{position:absolute;left:0;top:0;height:100%;border-radius:999px;background:linear-gradient( 90deg,#4f21ff 0%,#6b4dff 35%,#9a88ff 65%,#ffffff 100% );transition:width .4s ease}
.budget-bottom{display:flex;justify-content:space-between;align-items:flex-start}
.marker-label{font-size:10px;color:rgba(255,255,255,.45);line-height:1;margin-bottom:2px;white-space:nowrap}
#budget-spent,#budget-remaining{font-size:12px;font-weight:200;color:rgba(255,255,255,.85)}
.budget-spent-row{display:flex;align-items:center;gap:8px}
.budget-percent{display:inline-flex;align-items:center;justify-content:center;min-width:10px;height:20px;padding:0 10px;border-radius:999px;background:rgba(255,255,255,.10);color:rgba(255,255,255,.85);font-size:11.5px;line-height:1}
#last-month-marker{position:absolute;top:-40px;transform:translateX(-50%);text-align:center;pointer-events:none}
#last-month-marker .marker-value{font-size:11px;color:rgba(255,255,255,.65);margin-bottom:2px}
#last-month-marker .triangle{width:0;height:0;margin:auto;border-left:5px solid transparent;border-right:5px solid transparent;border-bottom:7px solid #fff}

.tx-detail-row{display:grid !important;grid-template-columns:5fr 2fr 2fr 1.6fr;align-items:center;gap:1vw;padding:1vw 0.5vw 1vw 0vw;font-size:2.6vw;border-bottom:1px solid rgba(255,255,255,0.03);width:100%;box-sizing:border-box;cursor:pointer;transition:background 0.15s}
.tx-detail-row:hover{background:rgba(255,255,255,0.04);border-radius:0vw}
.tx-detail-row .td-desc{color:rgba(255,255,255,0.85);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:12vw;display:flex;align-items:center;padding-left:13vw;min-width:0}
.tx-detail-row .td-desc span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-detail-row .td-amt{text-align:right;color:rgba(255,255,255,0.85);font-weight:700;padding-left:7vw}
.tx-detail-row .td-empty{display:block}
.tx-detail-row .td-date{text-align:right;color:rgba(255,255,255,0.85);white-space:nowrap}
@media (max-width:400px){.tx-detail-row{display:flex !important;flex-direction:row;justify-content:space-between;font-size:4vw;padding:2vw 2vw 2vw 0vw}
.tx-detail-row .td-desc{flex:1;padding-left:14vw}
.tx-detail-row .cat-ico,.tx-detail-row .cat-ico-fb{width:6vw !important;height:6vw !important;flex-shrink:0}
.tx-detail-row .td-amt{width:auto;padding-right:9vw;flex-shrink:0}
.tx-detail-row .td-date{width:6vw;text-align:right;flex-shrink:0}
.tx-detail-row .td-empty{display:none !important}
}.sub-row.visible-tx .chevron{transform:rotate(90deg)}
.tx-details-container{display:none;width:100%}
.tx-details-container.visible{display:block}
.tx-date-badge{display:inline-flex;align-items:center;justify-content:center;width:5vw;height:5vw;border-radius:50%;background-color:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);font-size:2.6vw;font-weight:400;text-align:center;box-sizing:border-box}
@media (max-width:400px){.tx-date-badge{width:6.5vw;height:6.5vw;font-size:3.6vw;background-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7)}
}

/*RECENT */
#tx-list{display:flex;flex-direction:column;margin-top:5px}
.tx-group-hdr{font-size:2.3vw;font-weight:700;color:rgba(255,255,255,0.45);letter-spacing:0.05em;padding:2.5vw 0 1vw;margin-top:0.5vw}
.tx-group-hdr:first-child{padding-top:0.5vw}
.row{display:flex;align-items:center;padding:2vw 0;border-bottom:1px solid rgba(255,255,255,0.08);gap:3vw;cursor:pointer;transition:background 0.2s ease,border-radius 0.2s ease,padding 0.2s ease}

.row:last-child { border-bottom:none; }
.row:hover { background:rgba(255,255,255,0.04); border-radius:0vw; padding:2vw 1vw; }
.row.expanded { background:rgba(255,255,255,0.04); border-radius:0vw; padding:2.2vw 1.5vw; }
.ico { width:10vw; height:10vw; border-radius:50%; object-fit:contain; flex-shrink:0; background:rgba(255,255,255,0.08); padding:1.0vw; }
.ico-fb { width:10vw; height:10vw; border-radius:50%; flex-shrink:0; background:rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:4.5vw; font-weight:700; color:rgba(255,255,255,0.6); }
.mid { flex:1; min-width:0; }
.ttl { font-size:2.4vw; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:0.6vw; }
.dtl { font-size:2vw; color:rgba(255,255,255,0.5); line-height:1.4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row.expanded .dtl { white-space:normal; overflow:visible; text-overflow:unset; }
.rgt { display:flex; flex-direction:column; align-items:flex-end; flex-shrink:0; gap:0.8vw; }
.amt { font-size:2.4vw; font-weight:700; color:#fff; white-space:nowrap; }
.dte { font-size:1.9vw; color:rgba(255,255,255,0.4); white-space:nowrap; }

.ttl {
  display: flex;
  align-items: center;
  gap: 1.5vw; /* Adds space between your title text and the badge */
}
.recent-badge {
    font-size:2.4vw; font-weight:700; color:#14b8a6;
    background:rgba(74,222,128,0.14); border-radius:99px; padding: 0.4vw 1.2vw;
    white-space:nowrap;
  }
  @media screen and (max-width: 400px) {
  .recent-badge {font-size:3.6vw; }
}

/* ══ OVERVIEW SLIDE ══ */
#slide-2 { padding:0; overflow:hidden; margin-top:10px}
#ca-wrap { display:flex; width:100%; height:100%; }

/* iPad: 2-column */
#ca-col-left { flex:1; display:flex; flex-direction:column; gap:3vw; min-width:0; justify-content:top; padding:0; overflow:hidden; margin-top:10px}
#ca-col-right { flex:1; display:flex; flex-direction:column; gap:0; min-width:0; justify-content:top; padding:0; overflow:hidden; margin-top:10px }
#ca-section-balance, #ca-section-income, #ca-section-expense, #ca-section-weather { display:flex; flex-direction:column; flex:0 0 auto; min-width:0; }

/* Balance */
#ca-card-balance { display:flex; flex-direction:column; gap:1.3vw; }
.ca-list-item { display:flex; align-items:center; gap:1.6vw; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:1.8vw; padding:1vw 1.8vw; }
.ca-list-icon { width:4vw; height:4vw; border-radius:50%; object-fit:contain; flex-shrink:0; background:rgba(255,255,255,0.06); padding:0.5vw; }
.ca-bi-name { flex:1; font-size:2.88vw; font-weight:600; color:rgba(255,255,255,0.85); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ca-bi-val { font-size:2.92vw; font-weight:700; color:rgba(255,255,255,0.85); white-space:nowrap; text-align:right; margin-left:auto; }
.ca-list-pct { font-size:1.76vw; font-weight:600; color:rgba(255,255,255,0.45); background:rgba(255,255,255,0.07); border-radius:99vw; padding:0.4vw 1.2vw; white-space:nowrap; flex-shrink:0; }
.ca-mini-ring { width:5vw; height:5vw; flex-shrink:0; }

/* Income chart */
#ca-card-income { display:flex; justify-content:space-between; align-items:stretch; gap:0.5vw; padding:0 2vw; }
.ca-col-item { flex:1; display:flex; flex-direction:column; align-items:center; min-width:0; }
.ca-col-zone-pos { flex:1; width:100%; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; }
.ca-col-zone-neg { flex:1; width:100%; display:flex; flex-direction:column; justify-content:flex-start; align-items:center; }
.ca-col-pct { font-size:1.76vw; font-weight:700; color:rgba(255,255,255,0.8); white-space:nowrap; margin-bottom:0.3vw; }
.ca-col-icon-wrap { width:4vw; height:4vw; border-radius:50%; background:rgba(255,255,255,0.13); display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-bottom:0.4vw; }
.ca-col-icon-wrap img { width:2.6vw; height:2.6vw; object-fit:contain; }
.ca-col-val { font-size:1.84vw; color:rgba(255,255,255,0.55); white-space:nowrap; margin-bottom:0.4vw; text-align:center; }
.ca-col-bar { width:70%; background:rgba(255,255,255,0.85); transition:height 0.5s ease; }

/* Donut */
#ca-donut-wrap { width:25vw; height:25vw; position:relative; margin:0 auto 2vw auto; align-self:center; }
#ca-donut-wrap svg { width:100%; height:100%; filter:drop-shadow(0 4px 24px rgba(0,0,0,0.5)); }
.ca-donut-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; pointer-events:none; }
.ca-donut-center-label { font-size:1.67vw; color:rgba(255,255,255,0.45); margin-bottom:0.34vw; }
.ca-donut-center-val { font-size:2.66vw; font-weight:700; color:#fff; }
#ca-list { width:100%; padding:0 2.17vw; display:flex; flex-direction:column; }
.ca-list-row { display:flex; align-items:center; padding:1.3vw 0; border-bottom:1px solid rgba(255,255,255,0.07); gap:1.45vw; cursor:pointer; transition:opacity 0.2s; }
.ca-list-row:last-child { border-bottom:none; }
.ca-list-row.ca-dimmed { opacity:0.3; }
.ca-list-name { flex:1; font-size:2.88vw; font-weight:600; color:#fff; }
.ca-list-val { font-size:2.92vw; font-weight:600; color:rgba(255,255,255,0.85); white-space:nowrap; text-align:right; }
.ca-donut-lbl { display:none !important;}

/* Weather */
.ca-wx { padding:0 2vw; margin-bottom:3vw; }
.ca-wx-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:2vw; }
.ca-wx-city { font-size:3.22vw; font-weight:700; color:#fff; line-height:1.1; }
.ca-wx-date { font-size:2.42vw; color:rgba(255,255,255,0.55); margin-top:0.4vw; }
.ca-wx-current { display:flex; align-items:center; gap:1vw; }
.ca-wx-temp-big { font-size:3.57vw; font-weight:700; color:#fff; line-height:1; }
.ca-wx-cond { font-size:2.19vw; color:rgba(255,255,255,0.55); margin-top:0.3vw; text-align:right; }
.ca-wx-hourly { display:flex; overflow-x:auto; scrollbar-width:none; }
.ca-wx-hourly::-webkit-scrollbar { display:none; }
.ca-wx-hour { flex:1; display:flex; flex-direction:column; align-items:center; gap:0.6vw; padding:0 0.5vw; }
.ca-wx-hour-time { font-size:2.3vw; color:rgba(255,255,255,0.5); }
.ca-wx-hour-temp { font-size:2.76vw; font-weight:700; color:#fff; }
.ca-wx-hour-wind { font-size:2.07vw; color:rgba(255,255,255,0.5); }

/* Countdown */
.ca-countdown { display:flex; gap:2vw; padding:0 2vw; justify-content:center; align-items:flex-end; }
.ca-unit { display:flex; flex-direction:column; align-items:center; gap:1vw; flex:1 1 0; }
.ca-card { position:relative; width:100%; aspect-ratio:1/1; background:#f5f5f5; border-radius:8%; display:flex; align-items:center; justify-content:center; box-shadow:0 0.5vw 1vw rgba(0,0,0,0.45),0 0.1vw 0.3vw rgba(0,0,0,0.3),inset 0 0.1vw 0 rgba(255,255,255,0.8); overflow:hidden; }
.ca-card::after { content:''; position:absolute; left:0; right:0; top:50%; height:1.5px; background:rgba(0,0,0,0.12); z-index:2; }
.ca-card::before { content:''; position:absolute; top:0; left:0; right:0; height:50%; background:rgba(0,0,0,0.04); z-index:1; border-radius:8% 8% 0 0; }
.ca-card-number { font-size:8.05vw; font-weight:400; color:#222; letter-spacing:-0.05em; z-index:3; line-height:1; font-variant-numeric:tabular-nums; }
.ca-label { font-size:2.53vw; color:#aaa; text-transform:capitalize; letter-spacing:0.03em; font-weight:450; white-space:nowrap; }
.ca-card.ca-flip .ca-card-number { animation:caFlip 0.4s ease-in-out; }
@keyframes caFlip { 0%{transform:rotateX(0deg);opacity:1} 40%{transform:rotateX(-90deg);opacity:0} 60%{transform:rotateX(-90deg);opacity:0} 100%{transform:rotateX(0deg);opacity:1} }

/* ══ SUBSCRIPTION SLIDE ══ */
.card{max-width:100%;margin:0 auto}
.sub-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sub-title{font-size:15px;font-weight:700;color:rgba(255,255,255,0.85)}
.sub-refresh-row{display:flex;align-items:center;gap:8px}
.sub-last-updated{font-size:11px;color:rgba(255,255,255,0.35);white-space:nowrap}
.sub-refresh-btn{border:none;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:4px;border-radius:50%;transition:color 0.15s,background 0.15s}
.sub-refresh-btn:hover{color:#fff;background:rgba(255,255,255,0.08)}
.sub-refresh-btn.spinning svg{animation:subSpin 0.6s linear}
@keyframes subSpin{from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}.sub-stats-row{display:flex;gap:28px;margin-bottom:30px}
.sub-stat-val{font-size:25px;font-weight:800;color:rgba(255,255,255,0.95);letter-spacing:-0.02em;line-height:1;margin-bottom:4px;font-family:monospace}
.sub-stat-label{font-size:12.5px;color:rgba(255,255,255,0.45)}
.sub-stat-label .hl-teal{color:#2dd4bf;font-weight:600}
.sub-list-title{display:flex;align-items:center;justify-content:left;gap:2vw;width:100%;font-size:14px;font-weight:700;color:rgba(255,255,255,0.75);margin-bottom:12px}
.add-inline-btn{width:6vw;height:6vw;max-width:28px;max-height:28px;border-radius:50%;background:#14b8a6;border:none;color:#fff;font-size:4.5vw;font-weight:bold;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity 0.2s}
.add-inline-btn:active{opacity:0.8}

#sub-list{display:flex;flex-direction:column}
#sub-loading,#sub-empty{font-size:13px;color:rgba(255,255,255,0.4);padding:24px 0;text-align:center}
.sub-row:last-child{border-bottom:none}
.sub-row{display:flex;align-items:center;padding:2vw 0;border-bottom:1px solid rgba(255,255,255,0.08);gap:3vw;cursor:pointer;transition:background 0.2s ease,border-radius 0.2s ease,padding 0.2s ease}

<script>
/* ══ TAB SWITCHING ══ */
var currentTab = 0;
var numTabs = 4;
var caDataLoaded = false;

/* ══ TAB ORDER PERSISTENCE (localStorage — works in any regular browser) ══ */
var DEFAULT_TAB_ORDER = [0, 1, 2, 3]; // Detail, Recent, Overview
var LS_TAB_ORDER_KEY = 'finance-tab-order';
var LS_ACTIVE_TAB_KEY = 'finance-active-tab';

function loadTabOrder() {
  try {
    var raw = localStorage.getItem(LS_TAB_ORDER_KEY);
    if (raw) {
      var order = JSON.parse(raw);
      if (Array.isArray(order) && order.length === numTabs) return order;
    }
  } catch (e) {
    // no saved order yet, or storage unavailable — use default
  }
  return DEFAULT_TAB_ORDER.slice();
}

function saveTabOrder(order) {
  try {
    localStorage.setItem(LS_TAB_ORDER_KEY, JSON.stringify(order));
  } catch (e) {
    console.warn('Could not save tab order:', e);
  }
}

/* ══ LAST ACTIVE TAB PERSISTENCE ══ */
var DEFAULT_ACTIVE_TAB = 1; // Recent, as default fallback if nothing saved yet

function loadActiveTab() {
  try {
    var raw = localStorage.getItem(LS_ACTIVE_TAB_KEY);
    if (raw !== null) {
      var idx = parseInt(raw);
      if (!isNaN(idx) && idx >= 0 && idx < numTabs) return idx;
    }
  } catch (e) {
    // nothing saved yet, or storage unavailable
  }
  return DEFAULT_ACTIVE_TAB;
}

function saveActiveTab(idx) {
  try {
    localStorage.setItem(LS_ACTIVE_TAB_KEY, String(idx));
  } catch (e) {
    console.warn('Could not save active tab:', e);
  }
}

// Reorders BOTH the tab buttons AND their matching content slides
function applyTabOrder(order) {
  var tabBar = document.getElementById("tab-bar");
  var slidesWrap = document.getElementById("slides-wrap");
  var tabLine = document.getElementById("tab-line");

  var tabs = Array.prototype.slice.call(tabBar.querySelectorAll(".tab-btn"));
  var slides = Array.prototype.slice.call(slidesWrap.querySelectorAll(".slide"));

  order.forEach(function(idx) {
    var btn = tabs.find(function(b) { return parseInt(b.dataset.idx) === idx; });
    if (btn) tabBar.insertBefore(btn, tabLine);

    var slide = slides.find(function(s) { return parseInt(s.dataset.idx) === idx; });
    if (slide) slidesWrap.appendChild(slide);
  });
}

/* ══ TAB SWITCHING (position-aware, not fixed idx) ══ */
function switchTab(idx) {
  currentTab = idx;
  var tabs = Array.prototype.slice.call(document.querySelectorAll(".tab-btn"));
  tabs.forEach(function(btn) {
    btn.classList.toggle("active", parseInt(btn.dataset.idx) === idx);
  });

  // Find where this slide currently SITS in slides-wrap (its visual position),
  // not its fixed original idx — since slides get reordered along with tabs.
  var slides = Array.prototype.slice.call(document.querySelectorAll("#slides-wrap .slide"));
  var visualPos = slides.findIndex(function(s) { return parseInt(s.dataset.idx) === idx; });
  if (visualPos < 0) visualPos = idx;

  var pct = visualPos * (100 / numTabs);
  document.getElementById("slides-wrap").style.transform = "translateX(-" + pct + "%)";
  positionTabLine();

  saveActiveTab(idx); // remember this as the last tab shown
}

function positionTabLine() {
  var visibleBtns = Array.prototype.slice.call(document.querySelectorAll(".tab-btn"))
    .filter(function(b) { return window.getComputedStyle(b).display !== "none"; });
  var line = document.getElementById("tab-line");
  var ab = visibleBtns.find(function(b) { return parseInt(b.dataset.idx) === currentTab; });
  if (!ab) return;
  line.style.left = ab.offsetLeft+"px";
  line.style.width = ab.offsetWidth+"px";
}

/* ══ DRAG TO REORDER TABS (with tap-to-switch support, content follows) ══ */
(function() {
  var tabBar = document.getElementById("tab-bar");
  var slidesWrap = document.getElementById("slides-wrap");
  var dragEl = null;
  var startX = 0;
  var placeholder = null;
  var pointerId = null;
  var isDragging = false;      // becomes true only once movement passes threshold
  var DRAG_THRESHOLD = 6;      // px — below this, treat as a tap not a drag

  function getTabs() {
    return Array.prototype.slice.call(tabBar.querySelectorAll(".tab-btn"));
  }

  function beginDragVisuals() {
    var rect = dragEl.getBoundingClientRect();

    placeholder = document.createElement("div");
    placeholder.className = "tab-btn";
    placeholder.style.visibility = "hidden";
    placeholder.style.flex = window.getComputedStyle(dragEl).flex;
    tabBar.insertBefore(placeholder, dragEl);

    dragEl.style.position = "fixed";
    dragEl.style.left = rect.left + "px";
    dragEl.style.top = rect.top + "px";
    dragEl.style.width = rect.width + "px";
    dragEl.style.height = rect.height + "px";
    dragEl.style.zIndex = "1000";
    dragEl.style.pointerEvents = "none";
    dragEl.style.transition = "none";

    document.getElementById("tab-line").style.display = "none";
  }

  function onPointerDown(e) {
    var btn = e.target.closest(".tab-btn");
    if (!btn) return;
    dragEl = btn;
    pointerId = e.pointerId;
    startX = e.clientX;
    isDragging = false;

    dragEl.setPointerCapture(pointerId);

    tabBar.addEventListener("pointermove", onPointerMove);
    tabBar.addEventListener("pointerup", onPointerUp);
    tabBar.addEventListener("pointercancel", onPointerCancel);
  }

  function onPointerMove(e) {
    if (!dragEl) return;
    var dx = e.clientX - startX;

    if (!isDragging) {
      if (Math.abs(dx) < DRAG_THRESHOLD) return; // still just a tap so far
      isDragging = true;
      beginDragVisuals();
    }

    var rect = placeholder.getBoundingClientRect();
    dragEl.style.left = (rect.left + dx) + "px";

    var dragCenter = e.clientX;
    var tabs = getTabs().filter(function(t) { return t !== dragEl && t !== placeholder; });

    for (var i = 0; i < tabs.length; i++) {
      var r = tabs[i].getBoundingClientRect();
      var center = r.left + r.width / 2;
      if (dragCenter < center) {
        if (tabs[i] !== placeholder.nextSibling) {
          tabBar.insertBefore(placeholder, tabs[i]);
        }
        return;
      }
    }
    tabBar.appendChild(placeholder);
  }

  function cleanupListeners() {
    tabBar.removeEventListener("pointermove", onPointerMove);
    tabBar.removeEventListener("pointerup", onPointerUp);
    tabBar.removeEventListener("pointercancel", onPointerCancel);
    if (dragEl && pointerId !== null) {
      try { dragEl.releasePointerCapture(pointerId); } catch (e) {}
    }
  }

  function onPointerUp(e) {
    if (!dragEl) return;

    if (!isDragging) {
      // It was just a tap — switch to this tab directly.
      var tappedIdx = parseInt(dragEl.dataset.idx);
      cleanupListeners();
      dragEl = null;
      placeholder = null;
      switchTab(tappedIdx);
      return;
    }

    cleanupListeners();

    tabBar.insertBefore(dragEl, placeholder);
    placeholder.remove();
    placeholder = null;

    dragEl.style.position = "";
    dragEl.style.left = "";
    dragEl.style.top = "";
    dragEl.style.width = "";
    dragEl.style.height = "";
    dragEl.style.zIndex = "";
    dragEl.style.pointerEvents = "";
    dragEl.style.transition = "";

    document.getElementById("tab-line").style.display = "";

    var droppedIdx = parseInt(dragEl.dataset.idx);
    dragEl = null;

    // Reorder the content slides to match the new tab order
    var newOrder = getTabs().map(function(b) { return parseInt(b.dataset.idx); });
    var slides = Array.prototype.slice.call(slidesWrap.querySelectorAll(".slide"));
    newOrder.forEach(function(idx) {
      var slide = slides.find(function(s) { return parseInt(s.dataset.idx) === idx; });
      if (slide) slidesWrap.appendChild(slide);
    });

    // Treat the drop itself as also selecting that tab
    switchTab(droppedIdx);
    saveTabOrder(newOrder);
  }

  function onPointerCancel() {
    if (!dragEl) return;
    cleanupListeners();

    if (isDragging && placeholder) {
      tabBar.insertBefore(dragEl, placeholder);
      placeholder.remove();
      dragEl.style.position = "";
      dragEl.style.left = "";
      dragEl.style.top = "";
      dragEl.style.width = "";
      dragEl.style.height = "";
      dragEl.style.zIndex = "";
      dragEl.style.pointerEvents = "";
      dragEl.style.transition = "";
      document.getElementById("tab-line").style.display = "";
    }
    placeholder = null;
    dragEl = null;
    isDragging = false;
    positionTabLine();
  }

  tabBar.addEventListener("pointerdown", onPointerDown);
})();

/* ══ SHARED UTILS ══ */
function parseCsvRow(line) {
  var cols=[], cur="", inQ=false;
  for (var i=0;i<line.length;i++) {
    var c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){cols.push(cur.replace(/^"|"$/g,"").trim());cur="";}
    else{cur+=c;}
  }
  cols.push(cur.replace(/^"|"$/g,"").trim()); return cols;
}
function parseNum(s){if(!s)return 0;s=s.trim();if(s.charAt(0)==="("&&s.charAt(s.length-1)===")") s="-"+s.slice(1,-1);s=s.replace(/[^\d.\-]/g,"");var v=parseFloat(s);return isNaN(v)?0:v;}
function parseVal(s){if(!s)return NaN;s=s.trim();if(s.charAt(0)==="("&&s.charAt(s.length-1)===")") s="-"+s.slice(1,-1);s=s.replace(/[^\d.\-]/g,"");return parseFloat(s);}
function fmtK(v){var a=Math.abs(v);if(a>=1000000)return"\u20ab"+(v/1000000).toFixed(1)+"M";if(a>=1000)return"\u20ab"+Math.round(v/1000)+"K";return"\u20ab"+Math.round(v);}
function pctInfo(curr,last){if(!last||last===0)return{text:"\u2014",cls:"flat"};var pct=(curr-last)/Math.abs(last)*100;if(Math.abs(pct)<0.5)return{text:"\u00b10%",cls:"flat"};var cls=pct>0?"up":"down";var arrow=pct>0?"\u25b2":"\u25bc";return{text:arrow+Math.abs(pct).toFixed(0)+"%",cls:cls};}
function ringColor(pct){if(pct>90)return"rgba(255,255,255,0.8)";if(pct>70)return"#fbbf24";return"#14b8a6";}

function caRenderDonut(data){
  var svg=document.getElementById("ca-donut-svg");svg.innerHTML="";
  var total=data.reduce(function(s,d){return s+Math.abs(d.val);},0);
  var cx=100,cy=100,r=78,sw=28,GAP=4;
  var ns="http://www.w3.org/2000/svg";
  var defs=document.createElementNS(ns,"defs");
  CA_PALETTE.forEach(function(p){
    var g=document.createElementNS(ns,"linearGradient");g.setAttribute("id",p.id);g.setAttribute("x1","0%");g.setAttribute("y1","0%");g.setAttribute("x2","100%");g.setAttribute("y2","100%");
    [["0%",p.from],["100%",p.to]].forEach(function(pair){var s=document.createElementNS(ns,"stop");s.setAttribute("offset",pair[0]);s.setAttribute("stop-color",pair[1]);g.appendChild(s);});
    defs.appendChild(g);
  });
  svg.appendChild(defs);
  var tr=document.createElementNS(ns,"circle");tr.setAttribute("cx",cx);tr.setAttribute("cy",cy);tr.setAttribute("r",r);tr.setAttribute("fill","none");tr.setAttribute("stroke","rgba(255,255,255,0.06)");tr.setAttribute("stroke-width",sw);svg.appendChild(tr);
  var angle=0;
  data.forEach(function(item,i){
    var pct=Math.abs(item.val)/total,sweep=pct*360-GAP;if(sweep<=0){angle+=pct*360;return;}
    var path=document.createElementNS(ns,"path");path.setAttribute("d",caArc(cx,cy,r,angle,angle+sweep));
    path.setAttribute("fill","none");path.setAttribute("stroke","url(#"+CA_PALETTE[i%CA_PALETTE.length].id+")");
    path.setAttribute("stroke-width",sw);path.setAttribute("stroke-linecap","round");path.setAttribute("class","ca-seg");
    path.style.cursor="pointer";path.style.transition="opacity 0.25s, stroke-width 0.2s";
    (function(ii){path.addEventListener("click",function(e){e.stopPropagation();caHighlight(caActiveIdx===ii?null:ii);});})(i);
    svg.appendChild(path);angle+=pct*360;
  });
  svg.addEventListener("click",function(){caHighlight(null);});
  caSetCenter("Total",caFmtSh(data.reduce(function(s,d){return s+d.val;},0)));
  var wrap=document.getElementById("ca-donut-wrap");
  wrap.querySelectorAll(".ca-donut-lbl").forEach(function(el){el.remove();});
  var la=0;
  data.forEach(function(item,i){
    var pt=Math.abs(item.val)/total,mid=la+pt*360/2-90,rad=mid*Math.PI/180;
    var lx=50+0.56*Math.cos(rad)*100,ly=50+0.56*Math.sin(rad)*100;
    var lbl=document.createElement("div");lbl.className="ca-donut-lbl";lbl.style.left=lx+"%";lbl.style.top=ly+"%";
    var icons=["https://raw.githubusercontent.com/tinsntp/investment/main/cash.png","https://raw.githubusercontent.com/tinsntp/investment/main/expense.png","https://raw.githubusercontent.com/tinsntp/investment/main/bank%20loan.png"];
    lbl.innerHTML='<img src="'+icons[i%icons.length]+'" style="width:8vw;height:8vw;object-fit:contain;border-radius:50%;background:rgba(26,26,26,0.7);padding:1vw;" />'
      +'<span style="font-size:3.8vw;font-weight:700;color:#fff;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,0.8);">'+caFmtSh(item.val)+'</span>';
    wrap.appendChild(lbl);la+=pt*360;
  });caApplyLayout();
}

function caLoadBI(){

        var bI=(cols[0]||"").replace(/^"|"$/g,"").trim(),bN=(cols[1]||"").replace(/^"|"$/g,"").trim(),bV=caNum(cols[2]);
        var iI=(cols[4]||"").replace(/^"|"$/g,"").trim(),iN=(cols[5]||"").replace(/^"|"$/g,"").trim(),iV=caNum(cols[6]);

}

/* ── Weather ── */
(function(){
  var days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var months=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var now=new Date();
  var wxDate=document.getElementById("ca-wx-date");
  if(wxDate)wxDate.textContent=months[now.getMonth()]+" "+now.getDate()+" "+days[now.getDay()];
  function moonSVG(s){return'<svg width="'+s+'" height="'+s+'" viewBox="0 0 52 52" fill="none"><path d="M36 10 C36 21 27 28 17 26 C19 33 26 38 34 36 C43 34 47 25 44 17 C41 11 38 9 36 10Z" fill="#F5A623"/><ellipse cx="22" cy="37" rx="12" ry="8" fill="#90CAF9"/><ellipse cx="30" cy="39" rx="10" ry="7" fill="#90CAF9"/><ellipse cx="16" cy="39" rx="8" ry="6" fill="#90CAF9"/></svg>';}
  function sunSVG(s){return'<svg width="'+s+'" height="'+s+'" viewBox="0 0 52 52" fill="none"><circle cx="26" cy="26" r="10" fill="#F5A623"/><g stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"><line x1="26" y1="6" x2="26" y2="12"/><line x1="26" y1="40" x2="26" y2="46"/><line x1="6" y1="26" x2="12" y2="26"/><line x1="40" y1="26" x2="46" y2="26"/><line x1="11" y1="11" x2="15" y2="15"/><line x1="37" y1="37" x2="41" y2="41"/><line x1="41" y1="11" x2="37" y2="15"/><line x1="15" y1="37" x2="11" y2="41"/></g></svg>';}
  function cloudSVG(s){return'<svg width="'+s+'" height="'+s+'" viewBox="0 0 52 52" fill="none"><ellipse cx="22" cy="30" rx="13" ry="9" fill="#90CAF9"/><ellipse cx="32" cy="32" rx="11" ry="8" fill="#90CAF9"/><ellipse cx="16" cy="33" rx="9" ry="7" fill="#90CAF9"/></svg>';}
  function rainSVG(s){return'<svg width="'+s+'" height="'+s+'" viewBox="0 0 52 52" fill="none"><ellipse cx="22" cy="24" rx="13" ry="9" fill="#90CAF9"/><ellipse cx="32" cy="26" rx="11" ry="8" fill="#90CAF9"/><ellipse cx="16" cy="27" rx="9" ry="7" fill="#90CAF9"/><g stroke="#90CAF9" stroke-width="2" stroke-linecap="round"><line x1="18" y1="36" x2="16" y2="42"/><line x1="26" y1="36" x2="24" y2="42"/><line x1="34" y1="36" x2="32" y2="42"/></g></svg>';}
  function getIco(wmo,isDay,sz){if(wmo===0)return isDay?sunSVG(sz):moonSVG(sz);if(wmo<=2)return moonSVG(sz);if(wmo<=48)return cloudSVG(sz);return rainSVG(sz);}
  function wmoText(w){if(w===0)return"Clear sky";if(w===1)return"Mainly clear";if(w===2)return"Partly cloudy";if(w===3)return"Overcast";if(w<=48)return"Foggy";if(w<=67)return"Rain";if(w<=77)return"Snow";return"Thunderstorm";}
  function wDir(d){return["\u2191","\u2197","\u2192","\u2198","\u2193","\u2199","\u2190","\u2196"][Math.round(d/45)%8];}
  function icoSz(){return Math.round(window.innerWidth*0.045);}
  fetch("https://api.open-meteo.com/v1/forecast?latitude=10.8231&longitude=106.6297&current=temperature_2m,weathercode,windspeed_10m,winddirection_10m,is_day&hourly=temperature_2m,weathercode,windspeed_10m,winddirection_10m&timezone=Asia%2FHo_Chi_Minh&forecast_days=1")
    .then(function(r){return r.json();})
    .then(function(data){
      var cur=data.current;
      var t=document.getElementById("ca-wx-temp"),co=document.getElementById("ca-wx-cond"),im=document.getElementById("ca-wx-icon-main");
      if(t)t.textContent=Math.round(cur.temperature_2m)+"\u00b0C";
      if(co)co.textContent=wmoText(cur.weathercode);
      if(im)im.innerHTML=getIco(cur.weathercode,cur.is_day,icoSz()*1.2);
      var times=data.hourly.time,temps=data.hourly.temperature_2m,wmos=data.hourly.weathercode,wspds=data.hourly.windspeed_10m,wdirs=data.hourly.winddirection_10m;
      var nowH=now.getHours(),slots=[];
      for(var i=0;i<times.length&&slots.length<4;i++){if(parseInt(times[i].split("T")[1])>=nowH)slots.push(i);}
      var hourly=document.getElementById("ca-wx-hourly");
      if(hourly)hourly.innerHTML=slots.map(function(i){
        var hhmm=times[i].split("T")[1].slice(0,5);
        return'<div class="ca-wx-hour"><span class="ca-wx-hour-time">'+hhmm+'</span>'+getIco(wmos[i],hhmm>="06:00"&&hhmm<"18:00",icoSz())+'<span class="ca-wx-hour-temp">'+Math.round(temps[i])+"\u00b0C</span><span class=\"ca-wx-hour-wind\">"+wDir(wdirs[i])+Math.round(wspds[i])+"km/h</span></div>";
      }).join("");
    }).catch(function(){});
})();

/* ── Countdown ── */
(function(){
  var CA_TARGET=new Date("2028-12-25T00:00:00");
  var caPrev={years:-1,months:-1,weeks:-1,days:-1};
  function caPad(n){return String(n).padStart(2,"0");}
  function caCalc(){
    var now=new Date(),years=CA_TARGET.getFullYear()-now.getFullYear(),months=CA_TARGET.getMonth()-now.getMonth(),days=CA_TARGET.getDate()-now.getDate();
    if(days<0){months--;days+=new Date(CA_TARGET.getFullYear(),CA_TARGET.getMonth(),0).getDate();}
    if(months<0){years--;months+=12;}
    return{years:years,months:months,weeks:Math.floor(days/7),days:days%7};
  }
  function caAnim(id){var c=document.getElementById("ca-card-"+id);if(!c)return;c.classList.remove("ca-flip");void c.offsetWidth;c.classList.add("ca-flip");setTimeout(function(){c.classList.remove("ca-flip");},400);}
  function caUpdate(){
    var v=caCalc();
    if(v.years!==caPrev.years){var e=document.getElementById("ca-years");if(e)e.textContent=caPad(v.years);caAnim("years");}
    if(v.months!==caPrev.months){var e=document.getElementById("ca-months");if(e)e.textContent=caPad(v.months);caAnim("months");}
    if(v.weeks!==caPrev.weeks){var e=document.getElementById("ca-weeks");if(e)e.textContent=caPad(v.weeks);caAnim("weeks");}
    if(v.days!==caPrev.days){var e=document.getElementById("ca-days");if(e)e.textContent=caPad(v.days);caAnim("days");}
    caPrev=v;
  }
  caUpdate();setInterval(caUpdate,1000);
})();

    if(colL){colL.style.padding="0";}

function parseAmt(raw) {
        if (!raw) return NaN;
        var s = raw.trim();
        var neg = false;
        if (s.charAt(0) === "(" && s.charAt(s.length - 1) === ")") {
            neg = true;
            s = s.slice(1, -1);
        }
        s = s.replace(/[^\d,.\-]/g, ""); // strip currency symbols, letters, spaces
        if (s === "" || s === "-") return NaN;
        if (s.charAt(0) === "-") {
            neg = true;
            s = s.slice(1);
        }
        var lastComma = s.lastIndexOf(",");
        var lastDot = s.lastIndexOf(".");
        if (lastComma > -1 && lastDot > -1) {
            // Both separators present — whichever appears LAST is the true decimal separator
            if (lastComma > lastDot) {
                s = s.replace(/\./g, "").replace(",", "."); // dot=thousands, comma=decimal (VN/EU style)
            } else {
                s = s.replace(/,/g, ""); // comma=thousands, dot=decimal (US style)
            }
        } else if (lastComma > -1) {
            var afterComma = s.length - lastComma - 1;
            var commaCount = (s.match(/,/g) || []).length;
            if (commaCount === 1 && afterComma <= 2) {
                s = s.replace(",", "."); // single comma w/ 1-2 digits after = decimal comma
            } else {
                s = s.replace(/,/g, ""); // otherwise commas are thousands separators
            }
        } else if (lastDot > -1) {
            var afterDot = s.length - lastDot - 1;
            var dotCount = (s.match(/\./g) || []).length;
            if (!(dotCount === 1 && afterDot <= 2)) {
                s = s.replace(/\./g, ""); // multiple dots, or 3+ digits after = thousands separators (VN style)
            }
            // else: single dot w/ 1-2 digits after = a genuine decimal, leave as-is
        }
        var v = parseFloat(s);
        if (isNaN(v)) return NaN;
        return neg ? -v : v;
    }

    function fmtFull(v) {
        var sign = v < 0 ? "\u2212" : "";
        return sign + "\u20ab" + Math.round(Math.abs(v)).toLocaleString("en-US");
    }

    function fmtAxis(v) {
        var a = Math.abs(v),
            sign = v < 0 ? "-" : "";
        if (a >= 1e9) return sign + (a / 1e9).toFixed(1) + "B";
        if (a >= 1e6) return sign + (a / 1e6).toFixed(1) + "M";
        if (a >= 1e3) return sign + Math.round(a / 1e3) + "K";
        return sign + Math.round(a);
    }

function fmtMoney(v){return"-\u20ab"+Math.round(Math.abs(v)).toLocaleString("en-US");}
function fmtDate(raw){if(!raw)return"";var d=new Date(raw);if(!isNaN(d.getTime()))return d.toLocaleDateString("en-US",{day:"numeric",month:"long",year:"numeric"});return raw;}

function startOfDay(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}

function relativeGroupLabel(raw){
  if(!raw) return "Unknown";
  var d=new Date(raw);
  if(isNaN(d.getTime())) return "Unknown";
  var today=startOfDay(new Date());
  var day=startOfDay(d);
  var diffDays=Math.round((today-day)/86400000);

  if(diffDays===0) return "Today";
  if(diffDays===1) return "Yesterday";
  if(diffDays>1 && diffDays<7) return "This Week";

  // "This Month" only if same calendar month/year as today, but not already caught above
  if(day.getFullYear()===today.getFullYear() && day.getMonth()===today.getMonth()) return "This Month";

  // "Last Month"
  var lastMonth=new Date(today.getFullYear(),today.getMonth()-1,1);
  if(day.getFullYear()===lastMonth.getFullYear() && day.getMonth()===lastMonth.getMonth()) return "Last Month";

  // Older: group by "Month Year", e.g. "March 2026"
  return d.toLocaleDateString("en-US",{month:"long",year:"numeric"});
}

/* ══ CSV PARSE HELPERS ══ */
function csvRow(line) {
  var cols=[], cur="", inQ=false;
  for (var i=0;i<line.length;i++) {
    var c=line[i];
    if (c==='"') inQ=!inQ;
    else if (c===','&&!inQ) { cols.push(cur); cur=""; }
    else cur+=c;
  }
  cols.push(cur);
  return cols.map(function(s){ return s.replace(/^"|"$/g,"").trim(); });
}

function parseBool(s) {
  if (!s) return false;
  var v = s.trim().toLowerCase();
  return v==="true" || v==="1" || v==="yes" || v==="active" || v==="x" || v==="✓";
}

function parseAmt(raw) {
  if (!raw) return 0;
  var s = raw.trim();
  var neg = false;
  if (s.charAt(0)==="(" && s.charAt(s.length-1)===")") { neg = true; s = s.slice(1,-1); }
  s = s.replace(/[^\d,.\-]/g, "");
  if (s === "" || s === "-") return 0;
  if (s.charAt(0) === "-") { neg = true; s = s.slice(1); }

  var lastComma = s.lastIndexOf(","), lastDot = s.lastIndexOf(".");
  if (lastComma > -1 && lastDot > -1) {
    if (lastComma > lastDot) s = s.replace(/\./g,"").replace(",",".");
    else s = s.replace(/,/g,"");
  } else if (lastComma > -1) {
    var afterComma = s.length - lastComma - 1;
    var commaCount = (s.match(/,/g)||[]).length;
    if (commaCount===1 && afterComma<=2) s = s.replace(",",".");
    else s = s.replace(/,/g,"");
  } else if (lastDot > -1) {
    var afterDot = s.length - lastDot - 1;
    var dotCount = (s.match(/\./g)||[]).length;
    if (!(dotCount===1 && afterDot<=2)) s = s.replace(/\./g,"");
  }
  var v = parseFloat(s);
  if (isNaN(v)) return 0;
  return neg ? -v : v;
}

function parseSheetDate(raw) {
  if (!raw) return null;
  var s = raw.trim();
  var iso = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (iso) return new Date(parseInt(iso[1]), parseInt(iso[2])-1, parseInt(iso[3]));
  var dmy = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
  if (dmy) {
    var a=parseInt(dmy[1]), b=parseInt(dmy[2]), y=parseInt(dmy[3]);
    var day=a, month=b;
    if (a<=12 && b>12) { day=b; month=a; }
    return new Date(y, month-1, day);
  }
  var d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

function fmtFull(v) {
  var sign = v<0 ? "\u2212" : "";
  return sign + "\u20ab" + Math.round(Math.abs(v)).toLocaleString("en-US");
}

function fmtExpiryDate(d) {
  if (!d) return "\u2014";
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return d.getDate() + " " + months[d.getMonth()] + ", " + d.getFullYear();
}

function stripEmoji(str) {
  return (str||"").replace(/\p{Emoji_Presentation}|\p{Extended_Pictographic}/gu, "").trim();
}

/* ══ MOBILE DISPLAY-NAME SHORTENING (iPhone view only, ≤400px) ══ */
/* Matching is case-insensitive against the full (emoji-stripped) name.
   Add more entries here any time another name needs a short form on iPhone. */
var MOBILE_SHORT_NAMES = [
  { match: "fpt adsl vl", short: "ADSL VL" },
  { match: "fpt adsl tg", short: "ADSL TG" },
  { match: "kungfu stocks pro", short: "KFSP" },
  { match: "youtube premium",   short: "Premium" }
];

function getDisplayName(fullName, isMobile) {
  if (!isMobile) return fullName;
  var n = (fullName||"").toLowerCase();
  for (var i=0; i<MOBILE_SHORT_NAMES.length; i++) {
    if (n === MOBILE_SHORT_NAMES[i].match) return MOBILE_SHORT_NAMES[i].short;
  }
  return fullName;
}

/* ══ ICON MATCHING (built here, not sourced from the sheet) ══ */
function iconFor(name) {
  var n = (name||"").toLowerCase();
  
  var palette = ["#7c6cff","#f472b6","#14b8a6","#fbbf24","#60a5fa","#f87171","#a78bfa"];
  var hash = 0;
  for (var j=0; j<n.length; j++) hash = (hash*31 + n.charCodeAt(j)) >>> 0;
  var bg = palette[hash % palette.length];
  var ltr = (name||"?").trim().charAt(0).toUpperCase() || "?";
  return { bg:bg, ltr:ltr };
}

/* ══ LOAD + RENDER ══ */
var lastLoadedItems = []; // cached so we can re-render on resize without refetching

function loadSubscriptions() {
  fetch(CSV_URL + "&t=" + Date.now(), { cache:"no-store" })
    .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); })
    .then(function(text){
      var lines = text.split("\n").filter(function(l){ return l.trim(); });
      var rows = lines.map(csvRow);
      // Assume row 0 is a header row — skip it.
      rows = rows.slice(1);

      var items = [];
      rows.forEach(function(cols){
        if (!parseBool(cols[COL_ACTIVE])) return; // only Active = TRUE
        var rawName = (cols[COL_NAME]||"").trim();
        if (!rawName) return;
        var name = stripEmoji(rawName) || rawName;
        var price = parseAmt(cols[COL_PRICE]);
        var expiry = parseSheetDate(cols[COL_EXPIRY]||"");
        var iconUrl = (cols[COL_ICON]||"").trim();
        items.push({ name:name, price:price, expiry:expiry, iconUrl:iconUrl });
      });

      lastLoadedItems = items;
      renderSubscriptions(items);

      var now = new Date();
      var hh = String(now.getHours()).padStart(2,"0");
      var mm = String(now.getMinutes()).padStart(2,"0");
      var lastUpdatedEl = document.getElementById("sub-last-updated");
      if (lastUpdatedEl) lastUpdatedEl.textContent = hh+":"+mm+" ago";
    })
    .catch(function(err){
      document.getElementById("sub-loading").textContent = "Error: " + err.message;
    });
}

function renderSubscriptions(items) {
  globalSubItems = items;
  document.getElementById("sub-loading").style.display = "none";
  var listEl = document.getElementById("sub-list");

    empty.id = "sub-empty";
    empty.textContent = "No active subscriptions found.";
    listEl.appendChild(empty);
  }

  var isMobile = window.innerWidth <= 400;
  var total = 0;
  var totalExclKfs = 0;

  items.forEach(function(item, index){ // 🟢 Added index as fallback id
    total += item.price;
    if (item.name.toLowerCase().indexOf("kungfu stocks pro") < 0) {
      totalExclKfs += item.price;
    }

    var icon = iconFor(item.name);

    // 🟢 1. Create Swipe Wrapper Container
    var swipeContainer = document.createElement("div");
    swipeContainer.className = "sub-swipe-container";

    // 🟢 2. Create the Hidden Delete Action Layer underneath
    var deleteAction = document.createElement("div");
    deleteAction.className = "sub-delete-action";
    var itemId = item.id || index; // Use unique row ID if available, otherwise array index
    deleteAction.setAttribute("onclick", "deleteSubscription('" + itemId + "')");
    deleteAction.innerHTML = `
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        <line x1="10" y1="11" x2="10" y2="17"></line>
        <line x1="14" y1="11" x2="14" y2="17"></line>
      </svg>
    `;

    // 🟢 3. Your current sub-row acts as the moving card
    var row = document.createElement("div");
    row.className = "sub-row";

    var iconEl = document.createElement("div");
    iconEl.className = "sub-icon";

    if (item.iconUrl) {
      iconEl.style.background = "rgba(255,255,255,0.08)";
      var imgEl = document.createElement("img");
      imgEl.src = item.iconUrl;
      imgEl.style.width = "75%";
      imgEl.style.height = "75%";
      imgEl.style.objectFit = "contain";
      imgEl.style.borderRadius = "50%";
      imgEl.onerror = (function(el, fallbackIcon){
        return function(){
          el.style.background = fallbackIcon.bg;
          el.textContent = fallbackIcon.ltr;
          el.style.display = "flex"; el.style.alignItems = "center"; el.style.justifyContent = "center";
        };
      })(iconEl, icon);
      iconEl.appendChild(imgEl);
      iconEl.style.display = "flex"; iconEl.style.alignItems = "center"; iconEl.style.justifyContent = "center";
    } else {
      iconEl.style.background = icon.bg;
      iconEl.textContent = icon.ltr;
    }

    var mid = document.createElement("div");
    mid.className = "sub-mid";

    var nameRow = document.createElement("div");
    nameRow.className = "sub-name-row";

    var nameLeft = document.createElement("div");
    nameLeft.className = "sub-name-left";
    var nameEl = document.createElement("span");
    nameEl.className = "sub-name";
    nameEl.textContent = getDisplayName(item.name, isMobile);
    var badge = document.createElement("span");
    badge.className = "sub-badge";
    badge.textContent = "Active";
    nameLeft.appendChild(nameEl);
    nameLeft.appendChild(badge);

    var priceEl = document.createElement("div");
    priceEl.className = "sub-price";
    priceEl.innerHTML = fmtFull(item.price) + '<span class="sub-price-unit">/month</span>';

    nameRow.appendChild(nameLeft);
    nameRow.appendChild(priceEl);

    var expEl = document.createElement("div");
    expEl.className = "sub-expiry";
    expEl.innerHTML =
      '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>' +
      '<span>Expired: ' + fmtExpiryDate(item.expiry) + '</span>';

    mid.appendChild(nameRow);
    mid.appendChild(expEl);

    row.appendChild(iconEl);
    row.appendChild(mid);

    // 🟢 4. Glue everything together inside the container setup
    swipeContainer.appendChild(deleteAction);
    swipeContainer.appendChild(row);
    
    // 🟢 5. Attach the real-time gesture listener directly to this row card
    attachSwipeEvents(row, swipeContainer);

    // 🟢 6. Append the swipe container shell to the DOM list target
    listEl.appendChild(swipeContainer);
  });

  document.getElementById("sub-total-val").textContent = fmtFull(total);
  document.getElementById("sub-total-label").innerHTML =
    items.length + ' <span class="hl-teal">active</span> subscription' + (items.length===1?"":"s");

  document.getElementById("sub-total-excl-val").textContent = fmtFull(totalExclKfs);
  document.getElementById("sub-total-excl-label").innerHTML =
    ' <span class="hl-teal">Excl.</span> KungfuStocksPro';
}

// 🟢 Add this helper function to your script globally so you can call it anywhere
function closeAllSwipeRows() {
  document.querySelectorAll(".sub-swipe-container").forEach(function (container) {
    container.classList.remove("swiped");
    var cardRow = container.querySelector(".sub-row");
    if (cardRow) {
      cardRow.style.transition = "transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)";
      cardRow.style.transform = "translateX(0px)";
    }
    // Reset desktop button layering
    var btn = container.querySelector(".sub-delete-action");
    if (btn) btn.style.zIndex = "1";
  });
}

function attachSwipeEvents(cardRow, container) {
  var startX = 0;
  var currentX = 0;
  var isDragging = false;
  var maxSwipeWidth = 70;

  cardRow.addEventListener("touchstart", function (e) {
    handleStart(e.touches[0].clientX);
  }, { passive: true });

  cardRow.addEventListener("touchmove", function (e) {
    handleMove(e.touches[0].clientX);
  }, { passive: true });

  cardRow.addEventListener("touchend", function () {
    handleEnd();
  });

  cardRow.addEventListener("mousedown", function (e) {
    isDragging = true;
    handleStart(e.clientX);
    cardRow.style.cursor = "grabbing";
  });

  window.addEventListener("mousemove", function (e) {
    if (!isDragging) return;
    handleMove(e.clientX);
  });

  window.addEventListener("mouseup", function () {
    if (!isDragging) return;
    isDragging = false;
    cardRow.style.cursor = "grab";
    handleEnd();
  });

  function handleStart(clientX) {
    // 🟢 Close all OTHER rows when you start dragging a new one
    document.querySelectorAll(".sub-swipe-container.swiped").forEach(function (el) {
      if (el !== container) {
        el.classList.remove("swiped");
        var activeRow = el.querySelector(".sub-row");
        if (activeRow) activeRow.style.transform = "translateX(0px)";
        var activeBtn = el.querySelector(".sub-delete-action");
        if (activeBtn) activeBtn.style.zIndex = "1";
      }
    });

    startX = clientX;
    cardRow.style.transition = "none";
  }

  function handleMove(clientX) {
    currentX = clientX;
    var diffX = currentX - startX;

    if (diffX < 0) {
      var translateAmount = Math.max(diffX, -maxSwipeWidth);
      cardRow.style.transform = "translateX(" + translateAmount + "px)";
    }
  }

  function handleEnd() {
    var diffX = currentX - startX;
    cardRow.style.transition = "transform 0.2s cubic-bezier(0.16, 1, 0.3, 1)";

    // 🟢 If swiped left past half the button width, snap open and raise button priority
    if (diffX < -(maxSwipeWidth / 2)) {
      container.classList.add("swiped");
      cardRow.style.transform = "translateX(-" + maxSwipeWidth + "px)";
      
      var btn = container.querySelector(".sub-delete-action");
      if (btn) btn.style.zIndex = "3"; // Makes it clickable on desktop
    } else {
      // 🟢 Force it back completely if it didn't cross the threshold
      container.classList.remove("swiped");
      cardRow.style.transform = "translateX(0px)";
      var btn = container.querySelector(".sub-delete-action");
      if (btn) btn.style.zIndex = "1";
    }
    
    startX = 0;
    currentX = 0;
  }
}

window.addEventListener("resize", function(){
  if (lastLoadedItems.length) renderSubscriptions(lastLoadedItems);
});

/* ══ ADD RECORD (writes to the sheet via Apps Script Web App) ══ */
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxb1lPB9kZh-Q5C01U-DjuesOVlHgDEorEBK-pavyJUd5jPxZSub-Rx6unOCTDdrCS2/exec"; // ends in /exec

var addOverlay = document.getElementById("add-modal-overlay");
var addStatusEl = document.getElementById("add-status");
var addSubmitBtn = document.getElementById("add-submit-btn");
var globalSubItems = []; // 🟢 Global variable to hold your data backup safely

document.getElementById("add-fab").addEventListener("click", function(){
  document.getElementById("add-title").value = "";
  document.getElementById("add-total-amount").value = "";  
  document.getElementById("add-amount").value = "";
  document.getElementById("add-start-date").value = new Date().toISOString().slice(0,10);
  document.getElementById("add-end-date").value = new Date().toISOString().slice(0,10);
  document.getElementById("add-user").value = "1";
  addStatusEl.textContent = ""; addStatusEl.className = "add-status";
  addOverlay.classList.add("open");
});

document.getElementById("add-cancel-btn").addEventListener("click", function(){
  addOverlay.classList.remove("open");
});
addOverlay.addEventListener("click", function(e){
  if (e.target === addOverlay) addOverlay.classList.remove("open");
});

document.getElementById("add-submit-btn").addEventListener("click", function(){

  var title = document.getElementById("add-title").value.trim();
  var totalamount = document.getElementById("add-total-amount").value;
  var amount = document.getElementById("add-amount").value;
  var startdate = document.getElementById("add-start-date").value;
  var enddate = document.getElementById("add-end-date").value;
  var users = document.getElementById("add-user").value;

  if (!startdate || !enddate || !title || (!amount && !totalamount)) {
    addStatusEl.textContent = "Dates, Title, and Amount are required.";
    addStatusEl.className = "add-status error";
    return;
  }

  addSubmitBtn.disabled = true;
  addStatusEl.textContent = "Saving\u2026";
  addStatusEl.className = "add-status";

  // Apps Script Web Apps generally require no-cors from a static page,
  // which means we can't read the response — we optimistically assume
  // success if the request doesn't throw, then refresh the data.
  fetch(APPS_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain" }, // avoids a CORS preflight
    body: JSON.stringify({ title:title, totalamount:totalamount, amount:amount,startdate:startdate, enddate:enddate, users:users })
  })
  .then(function(){
    addStatusEl.textContent = "Saved!";
    addStatusEl.className = "add-status success";
    setTimeout(function(){
      addOverlay.classList.remove("open");
      addSubmitBtn.disabled = false;
      loadSubscriptions();
    }, 700);
  })
  .catch(function(err){
    addStatusEl.textContent = "Error: " + err.message;
    addStatusEl.className = "add-status error";
    addSubmitBtn.disabled = false;
  });
});

function deleteSubscription(itemId) {
  var targetItem = globalSubItems[itemId] || null; 
  
  if (!targetItem) {
    alert("Subscription could not be verified.");
    return;
  }

  var shortName = getDisplayName(targetItem.name, true);
  
  if (!confirm("Are you sure you want to permanently delete " + shortName + "?")) {
    // 🟢 User cancelled: snap everything back neatly immediately
    closeAllSwipeRows();
    return;
  }

  var deletePayload = {
    action: "delete",
    title: targetItem.name
  };

  var containers = document.getElementById("sub-list").children;
  if (containers[itemId]) {
    containers[itemId].style.opacity = "0.3";
    containers[itemId].style.pointerEvents = "none";
  }

  fetch(APPS_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(deletePayload)
  })
  .then(function() {
    // 🟢 Clear swipe styling positions before rebuilding the layout
    closeAllSwipeRows();
    setTimeout(function() {
      loadSubscriptions(); 
    }, 300);
  })
  .catch(function(err) {
    alert("Failed to delete records: " + err.message);
    closeAllSwipeRows();
    loadSubscriptions();
  });
}
