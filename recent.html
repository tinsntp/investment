<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recent Transactions</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#1a1a1a; border-radius:40px;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
  color:#fff; margin-top:0px;
}
body { display:flex; flex-direction:column; padding:0vw; overflow:hidden; }
.hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:2vw; }
.hdr-left { display:flex; align-items:center; gap:2vw; }
.hdr-icon { width:6vw; height:6vw; object-fit:contain; flex-shrink:0; }
.hdr-title { font-size:3vw; font-weight:700; color:#fff; }
#tx-list { display:flex; flex-direction:column; margin-top:20px; }
.row {
  display:flex; align-items:center;
  padding:2vw 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
  gap:3vw;
  cursor:pointer;
  transition:background 0.2s ease, border-radius 0.2s ease, padding 0.2s ease;
}
.row:last-child { border-bottom:none; }
.row.expanded {
  background:rgba(255,255,255,0.06);
  border-radius:2vw;
  padding:2.2vw 1.5vw;
}
.ico {
  width:10vw; height:10vw; border-radius:50%;
  object-fit:contain; flex-shrink:0;
  background:rgba(255,255,255,0.08); padding:1.5vw;
}
.ico-fb {
  width:10vw; height:10vw; border-radius:50%; flex-shrink:0;
  background:rgba(255,255,255,0.1);
  display:flex; align-items:center; justify-content:center;
  font-size:4.5vw; font-weight:700; color:rgba(255,255,255,0.6);
}
.mid { flex:1; min-width:0; }
.ttl {
  font-size:2.4vw; font-weight:700; color:#fff;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-bottom:0.6vw;
}
.dtl {
  font-size:2vw; color:rgba(255,255,255,0.5); line-height:1.4;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.row.expanded .dtl {
  white-space:normal;
  overflow:visible;
  text-overflow:unset;
}
.rgt { display:flex; flex-direction:column; align-items:flex-end; flex-shrink:0; gap:0.8vw; }
.amt { font-size:2.4vw; font-weight:700; color:#fff; white-space:nowrap; }
.dte { font-size:1.9vw; color:rgba(255,255,255,0.4); white-space:nowrap; }
#msg { font-size:3vw; color:rgba(255,255,255,0.4); text-align:center; padding:4vw; }
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-left">
    <img class="hdr-icon" src="https://github.com/tinsntp/investment/blob/main/icon/recent.png?raw=true" />
    <div class="hdr-title">Recent Transactions</div>
  </div>
</div>
<div id="msg">Loading...</div>
<div id="tx-list"></div>
<script>
var allData = [];

var NOISE_PATTERNS = [
  /GIAO DICH THE\s*[\d*]{4}\s*TAI/i,
  /NAP TIEN VI/i,
  /NAP VI DIEN TU/i,
  /TT QR VNPAY/i
];

function cleanDetail(s) {
  if (!s) return "";
  for (var i = 0; i < NOISE_PATTERNS.length; i++) {
    s = s.replace(NOISE_PATTERNS[i], "").trim();
  }
  return s.replace(/\s+/g, " ").trim();
}

function parseCsvRow(line) {
  var cols = [];
  var cur = "";
  var inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') {
      inQ = !inQ;
    } else if (c === "," && !inQ) {
      cols.push(cur.replace(/^"|"$/g, "").trim());
      cur = "";
    } else {
      cur += c;
    }
  }
  cols.push(cur.replace(/^"|"$/g, "").trim());
  return cols;
}

function parseVal(s) {
  if (!s) return NaN;
  s = s.trim();
  if (s.charAt(0) === "(" && s.charAt(s.length - 1) === ")") {
    s = "-" + s.slice(1, -1);
  }
  s = s.replace(/[^\d.\-]/g, "");
  return parseFloat(s);
}

function fmtMoney(v) {
  var a = Math.abs(v);
  return "-\u20ab" + Math.round(a).toLocaleString("en-US");
}

function fmtDate(raw) {
  if (!raw) return "";
  var d = new Date(raw);
  if (!isNaN(d.getTime())) {
    return d.toLocaleDateString("en-US", { day:"numeric", month:"long", year:"numeric" });
  }
  return raw;
}

function buildRow(item) {
  var row = document.createElement("div");
  row.className = "row";

  var iconEl;
  if (item.icon && item.icon.indexOf("http") === 0) {
    iconEl = document.createElement("img");
    iconEl.className = "ico";
    iconEl.src = item.icon;
    iconEl.onerror = (function(title) {
      return function() {
        var fb = document.createElement("div");
        fb.className = "ico-fb";
        fb.textContent = title ? title.charAt(0) : "?";
        this.parentNode.replaceChild(fb, this);
      };
    })(item.title);
  } else {
    iconEl = document.createElement("div");
    iconEl.className = "ico-fb";
    iconEl.textContent = item.icon || (item.title ? item.title.charAt(0) : "?");
  }

  var mid = document.createElement("div");
  mid.className = "mid";

  var ttl = document.createElement("div");
  ttl.className = "ttl";
  ttl.textContent = item.title;

  var dtl = document.createElement("div");
  dtl.className = "dtl";
  dtl.textContent = item.detail;

  mid.appendChild(ttl);
  mid.appendChild(dtl);

  var rgt = document.createElement("div");
  rgt.className = "rgt";

  var amt = document.createElement("div");
  amt.className = "amt";
  amt.textContent = fmtMoney(item.amount);

  var dte = document.createElement("div");
  dte.className = "dte";
  dte.textContent = fmtDate(item.date);

  rgt.appendChild(amt);
  rgt.appendChild(dte);

  row.appendChild(iconEl);
  row.appendChild(mid);
  row.appendChild(rgt);

  return row;
}

function render(data) {
  var list = document.getElementById("tx-list");
  list.innerHTML = "";
  for (var i = 0; i < data.length; i++) {
    list.appendChild(buildRow(data[i]));
  }
  applyLayout();
}

function loadData() {
  var url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQnzbOhfKNO_niIpBIoReyDiy5p-UdXvtO6SIMNKXrZts9Cax9hR_5F7RqB_uejrjZuyV6N-Pjc08kd/pub?output=csv&gid=528094299&t=" + Date.now();
  fetch(url, { cache: "no-store" })
    .then(function(res) {
      if (!res.ok) { throw new Error("HTTP " + res.status); }
      return res.text();
    })
    .then(function(text) {
      var lines = text.trim().split("\n").filter(function(l) { return l.trim(); });
      var start = 0;
      var first = parseCsvRow(lines[0]);
      if (isNaN(parseVal(first[3]))) { start = 1; }
      allData = [];
      for (var i = start; i < lines.length; i++) {
        var cols = parseCsvRow(lines[i]);
        if (!cols[2]) { continue; }
        allData.push({
          date:   cols[0] || "",
          icon:   cols[5] || "",
          title:  cols[2] || "",
          detail: cleanDetail(cols[4] || ""),
          amount: parseVal(cols[3])
        });
      }
      if (!allData.length) { throw new Error("No data found."); }
      document.getElementById("msg").style.display = "none";
      render(allData);
    })
    .catch(function(err) {
      document.getElementById("msg").textContent = "Error: " + err.message;
    });
}

loadData();
setInterval(loadData, 60000);

function applyLayout() {
  var w = window.innerWidth;
  var isMobile = w < 400;

  var titleFs  = isMobile ? "4.6vw" : "3vw";
  var detailFs = isMobile ? "4.0vw" : "2.5vw";
  var amtFs    = isMobile ? "4.6vw" : "3vw";
  var dateFs   = isMobile ? "3.8vw" : "2.5vw";
  var hdrFs    = isMobile ? "5vw"   : "3.5vw";
  var icoHdrSz = isMobile ? "9vw"   : "6vw";
  var icoSz    = isMobile ? "12vw"  : "9vw";
  var icoFbFs  = isMobile ? "7vw"   : "3.8vw";

  document.querySelectorAll(".row").forEach(function(el) {
    el.style.padding = isMobile ? "3.5vw 0" : "2vw 0";
  });
  document.querySelectorAll(".row.expanded").forEach(function(el) {
    el.style.padding = isMobile ? "3.5vw 2vw" : "2vw 1.5vw";
  });

  document.querySelector(".hdr-title").style.fontSize = hdrFs;

  var hdrIcon = document.querySelector(".hdr-icon");
  if (hdrIcon) { hdrIcon.style.width = icoHdrSz; hdrIcon.style.height = icoHdrSz; }

  document.querySelectorAll(".ttl").forEach(function(el) { el.style.fontSize = titleFs; });
  document.querySelectorAll(".dtl").forEach(function(el) { el.style.fontSize = detailFs; });
  document.querySelectorAll(".amt").forEach(function(el) { el.style.fontSize = amtFs; });
  document.querySelectorAll(".dte").forEach(function(el) { el.style.fontSize = dateFs; });
  document.querySelectorAll(".ico").forEach(function(el) {
    el.style.width = icoSz; el.style.height = icoSz;
  });
  document.querySelectorAll(".ico-fb").forEach(function(el) {
    el.style.width = icoSz; el.style.height = icoSz;
    el.style.fontSize = icoFbFs;
  });

  document.querySelectorAll(".row").forEach(function(el) {
    el.style.padding = isMobile ? "3.5vw 0" : "2vw 0";
  });
  document.querySelectorAll(".row.expanded").forEach(function(el) {
    el.style.padding = isMobile ? "3.5vw 2vw" : "2vw 1.5vw";
  });
}

document.getElementById("tx-list").addEventListener("click", function(e) {
  var row = e.target;
  while (row && !row.classList.contains("row")) {
    row = row.parentNode;
  }
  if (!row) return;
  var isExpanded = row.classList.contains("expanded");
  document.querySelectorAll(".row.expanded").forEach(function(el) {
    el.classList.remove("expanded");
  });
  if (!isExpanded) {
    row.classList.add("expanded");
  }
  applyLayout();
});

window.addEventListener("resize", applyLayout);
</script>
</body>
</html>
