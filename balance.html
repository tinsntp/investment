<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Balance</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    color: #fff;
    overflow: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 2.5vw;
  }
  #card-balance {
    display: flex;
    flex-direction: column;
    gap: 1.3vw;
  }
  .list-item {
    display: flex; align-items: center; gap: 1.6vw;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 1.6vw; padding: 0.5vw 1.8vw;
  }
  .list-icon {
    width: 4vw; height: 4vw; border-radius: 50%;
    object-fit: contain; flex-shrink: 0;
    background: rgba(255,255,255,0.06); padding: 0.5vw;
  }
  .bi-list-name {
    flex: 1; font-size: 2.5vw; font-weight: 600; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .bi-list-val {
    font-size: 2.54vw; font-weight: 700; color: #fff;
    white-space: nowrap; text-align: right; margin-left: auto;
  }
  .list-pct {
    font-size: 1.53vw; font-weight: 600; color: rgba(255,255,255,0.45);
    background: rgba(255,255,255,0.07); border-radius: 99vw;
    padding: 0.4vw 1.2vw; white-space: nowrap; flex-shrink: 0;
  }
  #bi-status { font-size: 1.5vw; color: rgba(255,255,255,0.4); text-align: center; padding: 2vw; }
</style>
</head>
<body>
<div id="bi-status">Loading…</div>
<div id="card-balance" style="display:none"></div>

<script>
(function() {
  const CSV_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQnzbOhfKNO_niIpBIoReyDiy5p-UdXvtO6SIMNKXrZts9Cax9hR_5F7RqB_uejrjZuyV6N-Pjc08kd/pub?output=csv&gid=311369594`;

  function fmt(v){return(v<0?'−':'')+'₫'+Math.round(Math.abs(v)).toLocaleString('en-US');}
  function stripEmoji(str){return str.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{1F000}-\u{1F0FF}\u{FE0F}\u{200D}]/gu,'').trim();}
  function splitCSVRow(row){const cols=[];let cur='',inQ=false;for(const ch of row){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){cols.push(cur);cur='';}else cur+=ch;}cols.push(cur);return cols;}
  function parseNum(str){if(!str)return NaN;let s=str.trim();if(/^\(.*\)$/.test(s))s='-'+s.slice(1,-1);s=s.replace(/[\u2212\u2013\u2014]/g,'-').replace(/[^0-9.\-]/g,'');return parseFloat(s);}
  function isSocial(name){return stripEmoji(name).toUpperCase().includes('SOCIAL');}

  function renderBalanceList(items) {
    const card=document.getElementById('card-balance');card.innerHTML='';
    const filtered=items.filter(d=>d.val&&Math.abs(d.val)>0);
    const total=filtered.filter(d=>!isSocial(d.name)).reduce((s,d)=>s+Math.abs(d.val),0);
    const sorted=[...filtered].sort((a,b)=>{const aS=isSocial(a.name),bS=isSocial(b.name);if(aS&&!bS)return 1;if(!aS&&bS)return -1;return Math.abs(b.val)-Math.abs(a.val);});
    sorted.forEach(({icon,name,val})=>{
      const social=isSocial(name),pct=total>0?(Math.abs(val)/total*100):0;
      const row=document.createElement('div');row.className='list-item';row.dataset.pct=social?'':pct.toFixed(1);
      row.innerHTML=`<img class="list-icon" src="${icon}" onerror="this.style.display='none'" /><div class="bi-list-name">${stripEmoji(name)}</div><div class="bi-list-val">${fmt(val)}</div><div class="list-pct">${social?'-----':pct.toFixed(1)+'%'}</div>`;
      card.appendChild(row);
    });
    card.style.display='flex';
    applyLayout();
  }

  async function load() {
    try {
      const r=await fetch(CSV_URL+'&t='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(`HTTP ${r.status}`);
      const rows=(await r.text()).trim().split('\n').filter(r=>r.trim());
      const balance=[];
      rows.forEach(row=>{
        const cols=splitCSVRow(row);
        const bIcon=(cols[0]||'').replace(/^"|"$/g,'').trim(),bName=(cols[1]||'').replace(/^"|"$/g,'').trim(),bVal=parseNum(cols[2]);
        if(bName&&!isNaN(bVal))balance.push({icon:bIcon,name:bName,val:bVal});
      });
      if(!balance.length)throw new Error('No data found.');
      document.getElementById('bi-status').style.display='none';
      renderBalanceList(balance);
    } catch(e){document.getElementById('bi-status').textContent=`⚠ ${e.message}`;}
  }
  load();setInterval(load,60000);
})();

function applyLayout() {
  const w = window.innerWidth;
  if (w < 400) {
    document.body.style.overflowY = 'auto';
    document.getElementById('card-balance').style.gap='3vw';
    document.querySelectorAll('.list-item').forEach(el=>{el.style.padding='1.6vw 1.8vw';el.style.gap='2.4vw';el.style.borderRadius='3vw';});
    document.querySelectorAll('.bi-list-name').forEach(el=>el.style.fontSize='4.57vw');
    document.querySelectorAll('.bi-list-val').forEach(el=>el.style.fontSize='4.57vw');
    document.querySelectorAll('#card-balance .list-pct').forEach(el=>el.style.fontSize='3.6vw');
    document.querySelectorAll('.list-icon').forEach(el=>{el.style.width='5.2vw';el.style.height='5.2vw';});

    document.querySelectorAll('#card-balance .list-item').forEach(row=>{
      if(row.querySelector('.mini-ring-wrap'))return;
      const pct=row.dataset.pct;if(pct===''||pct===undefined)return;
      const valEl=row.querySelector('.bi-list-val');
      const r=10,sw=3,circ=2*Math.PI*r,dash=(parseFloat(pct)/100)*circ,gap=circ-dash;
      const rw=document.createElement('div');rw.className='mini-ring-wrap';rw.style.cssText='width:5vw;height:5vw;flex-shrink:0;';
      rw.innerHTML=`<svg viewBox="0 0 28 28" style="width:100%;height:100%;"><circle cx="14" cy="14" r="${r}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="${sw}"/><circle cx="14" cy="14" r="${r}" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="${sw}" stroke-linecap="round" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="0" transform="rotate(-90 14 14)"/></svg>`;
      valEl.parentNode.insertBefore(rw,valEl);
    });
  } else {
    document.body.style.overflowY = 'hidden';
    document.getElementById('card-balance').style.gap='1.3vw';
    document.querySelectorAll('.list-item').forEach(el=>{el.style.padding='0.6vw 1.8vw';el.style.gap='1.6vw';el.style.borderRadius='1.6vw';});
    document.querySelectorAll('.bi-list-name').forEach(el=>el.style.fontSize='2.54vw');
    document.querySelectorAll('.bi-list-val').forEach(el=>el.style.fontSize='2.54vw');
    document.querySelectorAll('#card-balance .list-pct').forEach(el=>el.style.fontSize='2.125vw');
    document.querySelectorAll('.list-icon').forEach(el=>{el.style.width='4.5vw';el.style.height='4.5vw';});
    document.querySelectorAll('#card-balance .mini-ring-wrap').forEach(el=>el.remove());
  }
}
window.addEventListener('resize', applyLayout);
</script>
</body>
</html>
