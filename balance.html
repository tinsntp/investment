<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Combined Widget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    color: #fff;
    overflow: hidden;padding-top:25px;
  }

  body {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 100%;
    padding: 2.5vw;
    gap: 2.5vw;
  }

  #row-top {
    display: flex;
    flex-direction: row;
    flex: 0 0 auto;
    gap: 3vw;
    min-height: 0;
  }

  /* ── LEFT: List card with rounded-rect rows ── */
  #card-balance {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1.3vw;
  }

  .list-item {
    display: flex;
    align-items: center;
    gap: 1.6vw;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 1.6vw;
    padding: 0.5vw 1.8vw;
  }

  .list-icon {
    width: 4vw; height: 4vw;
    border-radius: 50%;
    object-fit: contain;
    flex-shrink: 0;
    background: rgba(255,255,255,0.06);
    padding: 0.5vw;
  }

  .bi-list-name {
    flex: 1;
    font-size: 2.5vw;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bi-list-val {
    font-size: 2.54vw;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    text-align: right;
    margin-left: auto;
  }

  .list-pct {
    font-size: 1.53vw;
    font-weight: 600;
    color: rgba(255,255,255,0.45);
    background: rgba(255,255,255,0.07);
    border-radius: 99vw;
    padding: 0.4vw 1.2vw;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── RIGHT: Column chart ── */
  #card-income {
    flex: 1;
    display: flex;
    justify-content: space-between;
    align-items: stretch;
    gap: 2vw;
    padding: 0 3vw;
    min-height: 0;
  }

  .col-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 0;
  }

  .col-zone-pos {
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
  }

  .col-zone-neg {
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
  }

  .col-baseline-row {
    width: 100%;
    height: 1.5px;
    background: rgba(255,255,255,0.2);
  }

  .col-pct {
    font-size: 1.53vw;
    font-weight: 700;
    color: rgba(255,255,255,0.8);
    white-space: nowrap;
    margin-bottom: 0.3vw;
  }

  .col-icon-wrap {
    width: 4vw; height: 4vw;
    border-radius: 50%;
    background: rgba(255,255,255,0.13);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-bottom: 0.4vw;
  }

  .col-icon-wrap img {
    width: 2.6vw; height: 2.6vw;
    object-fit: contain;
  }

  .col-val {
    font-size: 1.6vw;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
    margin-bottom: 0.4vw;
    text-align: center;
  }

  .col-bar {
    width: 70%;
    background: rgba(255,255,255,0.85);
    transition: height 0.5s ease;
  }

  #bi-status {
    font-size: 1.5vw;
    color: rgba(255,255,255,0.4);
    text-align: center;
    padding: 2vw;
  }
</style>
</head>
<body>

<div id="row-top">
  <div id="bi-status">Loading…</div>
  <div id="card-balance" style="display:none"></div>
  <div id="card-income"  style="display:none"></div>
</div>

<script>
(function() {

  const CSV_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQnzbOhfKNO_niIpBIoReyDiy5p-UdXvtO6SIMNKXrZts9Cax9hR_5F7RqB_uejrjZuyV6N-Pjc08kd/pub?output=csv&gid=311369594`;

  function fmt(v) {
    return (v < 0 ? '−' : '') + '₫' + Math.round(Math.abs(v)).toLocaleString('en-US');
  }

  function stripEmoji(str) {
    return str.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{1F000}-\u{1F0FF}\u{FE0F}\u{200D}]/gu, '').trim();
  }

  function splitCSVRow(row) {
    const cols = []; let cur = '', inQ = false;
    for (const ch of row) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += ch;
    }
    cols.push(cur);
    return cols;
  }

  function parseNum(str) {
    if (!str) return NaN;
    let s = str.trim();
    if (/^\(.*\)$/.test(s)) s = '-' + s.slice(1,-1);
    s = s.replace(/[\u2212\u2013\u2014]/g, '-').replace(/[^0-9.\-]/g, '');
    return parseFloat(s);
  }

  function isSocial(name) {
    return stripEmoji(name).toUpperCase().includes('SOCIAL');
  }

  function fmtShortSigned(v) {
    const a = Math.abs(v);
    const s = a >= 1e9 ? (a/1e9).toFixed(1)+'B'
            : a >= 1e6 ? (a/1e6).toFixed(1)+'M'
            : a >= 1e3 ? (a/1e3).toFixed(1)+'K'
            : String(Math.round(a));
    return (v < 0 ? '-' : '+') + s;
  }

  function renderBalanceList(items) {
    const card = document.getElementById('card-balance');
    card.innerHTML = '';

    const filtered = items.filter(d => d.val && Math.abs(d.val) > 0);
    const total = filtered
      .filter(d => !isSocial(d.name))
      .reduce((s, d) => s + Math.abs(d.val), 0);
    const sorted = [...filtered].sort((a,b) => {
      const aSocial = isSocial(a.name), bSocial = isSocial(b.name);
      if (aSocial && !bSocial) return 1;
      if (!aSocial && bSocial) return -1;
      return Math.abs(b.val) - Math.abs(a.val);
    });

    sorted.forEach(({ icon, name, val }) => {
      const social = isSocial(name);
      const pct = total > 0 ? (Math.abs(val) / total * 100) : 0;
      const row = document.createElement('div');
      row.className = 'list-item';
      row.dataset.pct = social ? '' : pct.toFixed(1);
      row.innerHTML = `
        <img class="list-icon" src="${icon}" onerror="this.style.display='none'" />
        <div class="bi-list-name">${stripEmoji(name)}</div>
        <div class="bi-list-val">${fmt(val)}</div>
        <div class="list-pct">${social ? '--' : pct.toFixed(1) + '%'}</div>`;
      card.appendChild(row);
    });

    card.style.display = 'flex';
    applyLayout();
  }

  function renderIncomeColumns(items) {
    const card = document.getElementById('card-income');
    card.innerHTML = '';

    const filtered = items.filter(d => d.val && Math.abs(d.val) > 0);
    const total    = filtered.reduce((s, d) => s + Math.abs(d.val), 0);
    const sorted   = [...filtered].sort((a,b) => Math.abs(b.val) - Math.abs(a.val));
    const maxAbs   = Math.max(...sorted.map(d => Math.abs(d.val)), 1);

    const cardH    = Math.max(140, Math.min(window.innerWidth * 0.32, 260));
    const posZoneH = cardH * 0.55;
    const negZoneH = cardH * 0.45;
    const maxBarPx = Math.min(posZoneH, negZoneH) * 0.55;

    card.style.minHeight = cardH + 'px';

    sorted.forEach(({ icon, name, val }) => {
      const isPos = val >= 0;
      const pct   = total > 0 ? (Math.abs(val) / total * 100) : 0;
      const barH  = Math.max(4, (Math.abs(val) / maxAbs) * maxBarPx);

      const col = document.createElement('div');
      col.className = 'col-item';

      const posZone = document.createElement('div');
      posZone.className = 'col-zone-pos';
      posZone.style.height = posZoneH + 'px';

      const negZone = document.createElement('div');
      negZone.className = 'col-zone-neg';
      negZone.style.height = negZoneH + 'px';

      if (isPos) {
        posZone.innerHTML = `
          <div class="col-pct">${pct.toFixed(1)}%</div>
          <div class="col-val">${fmtShortSigned(val)}</div>
          <div class="col-icon-wrap"><img src="${icon}" onerror="this.style.display='none'" /></div>
          <div class="col-bar" style="height:${barH}px; border-radius:1vw 1vw 0 0;"></div>`;
      } else {
        negZone.innerHTML = `
          <div class="col-bar" style="height:${barH}px; border-radius:0 0 1vw 1vw;"></div>
          <div class="col-icon-wrap" style="margin-top:0.4vw;"><img src="${icon}" onerror="this.style.display='none'" /></div>
          <div class="col-val">${fmtShortSigned(val)}</div>
          <div class="col-pct" style="margin-bottom:0;">${pct.toFixed(1)}%</div>`;
      }

      col.appendChild(posZone);
      const baselineRow = document.createElement('div');
      baselineRow.className = 'col-baseline-row';
      col.appendChild(baselineRow);
      col.appendChild(negZone);
      card.appendChild(col);
    });

    card.style.display = 'flex';
    applyLayout();
  }

  async function load() {
    try {
      const r = await fetch(CSV_URL + '&t=' + Date.now(), { cache: 'no-store' });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const text = await r.text();
      const rows = text.trim().split('\n').filter(r => r.trim());

      const balance = [], income = [];
      rows.forEach(row => {
        const cols = splitCSVRow(row);
        const bIcon = (cols[0] || '').replace(/^"|"$/g,'').trim();
        const bName = (cols[1] || '').replace(/^"|"$/g,'').trim();
        const bVal  = parseNum(cols[2]);
        const iIcon = (cols[4] || '').replace(/^"|"$/g,'').trim();
        const iName = (cols[5] || '').replace(/^"|"$/g,'').trim();
        const iVal  = parseNum(cols[6]);
        if (bName && !isNaN(bVal)) balance.push({ icon: bIcon, name: bName, val: bVal });
        if (iName && !isNaN(iVal)) income.push({ icon: iIcon, name: iName, val: iVal });
      });

      if (!balance.length && !income.length) throw new Error('No data found in columns A-C or E-G.');
      document.getElementById('bi-status').style.display = 'none';
      renderBalanceList(balance);
      renderIncomeColumns(income);
    } catch(e) {
      document.getElementById('bi-status').textContent = `⚠ ${e.message}`;
    }
  }

  load();
  setInterval(load, 60000);

})();
</script>

<script>
/* ── Responsive layout ── */
function applyLayout() {
  const w = window.innerWidth;
  const rowTop = document.getElementById('row-top');

  if (w < 400) {
    // Mobile: stack vertically
    rowTop.style.flexDirection = 'column';
    rowTop.style.gap = '3vw';
    document.body.style.justifyContent = 'flex-start';
    document.body.style.overflowY = 'auto';

    document.getElementById('card-balance').style.gap = '3vw';
    document.querySelectorAll('.list-item').forEach(el => {
      el.style.padding = '1.6vw 1.8vw';
      el.style.gap     = '2.4vw';
      el.style.borderRadius = '3vw';
    });
    document.querySelectorAll('.bi-list-name').forEach(el => el.style.fontSize = '4.57vw');
    document.querySelectorAll('.bi-list-val').forEach(el  => el.style.fontSize = '4.57vw');
    document.querySelectorAll('#card-balance .list-pct').forEach(el => el.style.fontSize = '3.6vw');
    document.querySelectorAll('.list-icon').forEach(el => {
      el.style.width  = '5.2vw';
      el.style.height = '5.2vw';
    });
    document.querySelectorAll('.col-pct').forEach(el => el.style.fontSize = '3.6vw');
    document.querySelectorAll('.col-val').forEach(el => el.style.fontSize = '4.57vw');
    document.querySelectorAll('.col-icon-wrap img').forEach(el => {
      el.style.width  = '5.2vw';
      el.style.height = '5.2vw';
    });
    document.querySelectorAll('.col-icon-wrap').forEach(el => {
      el.style.width  = '7vw';
      el.style.height = '7vw';
    });

    document.getElementById('card-income').style.marginTop = '30px';

    // Add mini ring before value on mobile
    document.querySelectorAll('#card-balance .list-item').forEach(row => {
      if (row.querySelector('.mini-ring-wrap')) return;
      const pct = row.dataset.pct;
      if (pct === '' || pct === undefined) return;
      const valEl = row.querySelector('.bi-list-val');
      const r = 10, sw = 3, circ = 2 * Math.PI * r;
      const dash = (parseFloat(pct) / 100) * circ;
      const gap  = circ - dash;
      const ringWrap = document.createElement('div');
      ringWrap.className = 'mini-ring-wrap';
      ringWrap.style.cssText = 'width:5vw;height:5vw;flex-shrink:0;';
      ringWrap.innerHTML = `<svg viewBox="0 0 28 28" style="width:100%;height:100%;">
        <circle cx="14" cy="14" r="${r}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="${sw}"/>
        <circle cx="14" cy="14" r="${r}" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="${sw}"
          stroke-linecap="round" stroke-dasharray="${dash} ${gap}"
          stroke-dashoffset="0" transform="rotate(-90 14 14)"/>
      </svg>`;
      valEl.parentNode.insertBefore(ringWrap, valEl);
    });

  } else {
    // Desktop/iPad: side-by-side
    rowTop.style.flexDirection = 'row';
    rowTop.style.gap = '3vw';
    document.body.style.justifyContent = 'flex-end';
    document.body.style.overflowY = 'hidden';
    document.body.style.gap = '1.5vw';

    document.getElementById('card-balance').style.gap = '1.3vw';
    document.querySelectorAll('.list-item').forEach(el => {
      el.style.padding = '0.6vw 1.8vw';
      el.style.gap     = '1.6vw';
      el.style.borderRadius = '1.6vw';
    });
    document.querySelectorAll('.bi-list-name').forEach(el => el.style.fontSize = '2.54vw');
    document.querySelectorAll('.bi-list-val').forEach(el  => el.style.fontSize = '2.54vw');
    document.querySelectorAll('#card-balance .list-pct').forEach(el => el.style.fontSize = '2.125vw');
    document.querySelectorAll('.list-icon').forEach(el => {
      el.style.width  = '4.5vw';
      el.style.height = '4.5vw';
    });
    document.querySelectorAll('.col-pct').forEach(el => el.style.fontSize = '2.125vw');
    document.querySelectorAll('.col-val').forEach(el => el.style.fontSize = '2vw');
    document.querySelectorAll('.col-icon-wrap img').forEach(el => {
      el.style.width  = '2.8vw';
      el.style.height = '2.8vw';
    });
    document.querySelectorAll('.col-icon-wrap').forEach(el => {
      el.style.width  = '4.5vw';
      el.style.height = '4.5vw';
    });

    document.getElementById('card-income').style.marginTop = '0px';

    // Remove mini ring on desktop
    document.querySelectorAll('#card-balance .mini-ring-wrap').forEach(el => el.remove());
  }
}

window.addEventListener('resize', applyLayout);
</script>
</body>
</html>
