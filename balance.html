<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balance & Income</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    color: #fff;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: row;
    gap: 2.5vw;
    padding: 2.5vw;
  }

  /* ── LEFT: List card with rounded-rect rows ── */
  #card-balance {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1.3vw;
  }

  .list-item {
    display: flex;
    align-items: center;
    gap: 1.6vw;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 1.6vw;
    padding: 1.6vw 1.8vw;
  }

  .list-icon {
    width: 4vw; height: 4vw;
    border-radius: 50%;
    object-fit: contain;
    flex-shrink: 0;
    background: rgba(255,255,255,0.06);
    padding: 0.5vw;
  }

  .list-name {
    flex: 1;
    font-size: 2.2vw;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .list-val {
    font-size: 2.2vw;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
  }

  .list-pct {
    font-size: 1.8vw;
    font-weight: 600;
    color: rgba(255,255,255,0.45);
    background: rgba(255,255,255,0.07);
    border-radius: 99vw;
    padding: 0.4vw 1.2vw;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── RIGHT: Column chart ── */
  #card-income {
    flex: 1;
    position: relative;
    display: flex;
    justify-content: center;
    gap: 2vw;
  }

  .col-item {
    flex: 1;
    max-width: 14vw;
    position: relative;
    height: 100%;
  }

  .col-baseline {
    position: absolute;
    left: 0; right: 0;
    height: 1.5px;
    background: rgba(255,255,255,0.2);
  }

  .col-bar {
    position: absolute;
    left: 0; width: 100%;
    background: rgba(255,255,255,0.5);
    transition: height 0.5s ease;
  }

  .col-icon-wrap {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 4vw; height: 4vw;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .col-icon-wrap img {
    width: 2.6vw; height: 2.6vw;
    object-fit: contain;
  }

  .col-pct {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.8vw;
    font-weight: 700;
    color: rgba(255,255,255,0.8);
    white-space: nowrap;
  }

  #status {
    font-size: 2vw;
    color: rgba(255,255,255,0.4);
    text-align: center;
    padding: 4vw;
  }
</style>
</head>
<body>

<div id="status">Loading…</div>

<div id="card-balance" style="display:none"></div>
<div id="card-income"  style="display:none"></div>

<script>
  const CSV_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQnzbOhfKNO_niIpBIoReyDiy5p-UdXvtO6SIMNKXrZts9Cax9hR_5F7RqB_uejrjZuyV6N-Pjc08kd/pub?output=csv&gid=311369594`;

  const BAR_COLORS = ['#7B61FF', '#E0E0E0', '#4285F4', '#E0E0E0'];

  function fmt(v) {
    return (v < 0 ? '−' : '') + '₫' + Math.round(Math.abs(v)).toLocaleString('en-US');
  }

  function stripEmoji(str) {
    return str.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{1F000}-\u{1F0FF}\u{FE0F}\u{200D}]/gu, '').trim();
  }

  function splitCSVRow(row) {
    const cols = []; let cur = '', inQ = false;
    for (const ch of row) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += ch;
    }
    cols.push(cur);
    return cols;
  }

  function parseNum(str) {
    if (!str) return NaN;
    let s = str.trim();
    if (/^\(.*\)$/.test(s)) s = '-' + s.slice(1,-1);
    s = s.replace(/[\u2212\u2013\u2014]/g, '-').replace(/[^0-9.\-]/g, '');
    return parseFloat(s);
  }

  function isSocial(name) {
    return stripEmoji(name).toUpperCase().includes('SOCIAL');
  }

  function renderBalanceList(items) {
    const card = document.getElementById('card-balance');
    card.innerHTML = '';

    const filtered = items.filter(d => d.val && Math.abs(d.val) > 0);
    // exclude SOCIAL from the percentage total
    const total = filtered
      .filter(d => !isSocial(d.name))
      .reduce((s, d) => s + Math.abs(d.val), 0);
    const sorted = [...filtered].sort((a,b) => Math.abs(b.val) - Math.abs(a.val));

    sorted.forEach(({ icon, name, val }) => {
      const social = isSocial(name);
      const pct = total > 0 ? (Math.abs(val) / total * 100) : 0;
      const row = document.createElement('div');
      row.className = 'list-item';
      row.innerHTML = `
        <img class="list-icon" src="${icon}" onerror="this.style.display='none'" />
        <div class="list-name">${stripEmoji(name)}</div>
        <div class="list-val">${fmt(val)}</div>
        <div class="list-pct">${social ? '' : pct.toFixed(0) + '%'}</div>`;
      card.appendChild(row);
    });

    card.style.display = 'flex';
  }

  function renderIncomeColumns(items) {
    const card = document.getElementById('card-income');
    card.innerHTML = '';

    const filtered = items.filter(d => d.val && Math.abs(d.val) > 0);
    const total    = filtered.reduce((s, d) => s + Math.abs(d.val), 0);
    const sorted   = [...filtered].sort((a,b) => Math.abs(b.val) - Math.abs(a.val));
    const maxAbs   = Math.max(...sorted.map(d => Math.abs(d.val)), 1);

    const cardH    = window.innerWidth * 0.30; // total chart height px
    const baselineY = cardH * 0.55;            // baseline position (room above for icon+pct)
    const maxBarH  = Math.min(baselineY * 0.7, (cardH - baselineY) * 0.9);

    card.style.height = cardH + 'px';

    // baseline rule
    const bl = document.createElement('div');
    bl.className = 'col-baseline';
    bl.style.top = baselineY + 'px';
    card.appendChild(bl);

    sorted.forEach(({ icon, name, val }) => {
      const isPos = val >= 0;
      const pct   = total > 0 ? (Math.abs(val) / total * 100) : 0;
      const barH  = (Math.abs(val) / maxAbs) * maxBarH;

      const col = document.createElement('div');
      col.className = 'col-item';

      if (isPos) {
        // bar grows upward from baseline; icon above bar; pct above icon
        col.innerHTML = `
          <div class="col-bar" style="bottom:${cardH - baselineY}px; height:${barH}px; border-radius:0.8vw 0.8vw 0 0;"></div>
          <div class="col-icon-wrap" style="bottom:${cardH - baselineY + barH + 8}px;">
            <img src="${icon}" onerror="this.style.display='none'" />
          </div>
          <div class="col-pct" style="bottom:${cardH - baselineY + barH + window.innerWidth*0.052}px;">${pct.toFixed(0)}%</div>
        `;
      } else {
        // bar grows downward from baseline; icon above baseline (top); pct above icon
        col.innerHTML = `
          <div class="col-bar" style="top:${baselineY}px; height:${barH}px; border-radius:0 0 0.8vw 0.8vw;"></div>
          <div class="col-icon-wrap" style="top:${baselineY - window.innerWidth*0.044 - 8}px;">
            <img src="${icon}" onerror="this.style.display='none'" />
          </div>
          <div class="col-pct" style="top:${baselineY - window.innerWidth*0.044 - window.innerWidth*0.052 - 8}px;">${pct.toFixed(0)}%</div>
        `;
      }
      card.appendChild(col);
    });

    card.style.display = 'flex';
  }

  async function load() {
    try {
      const r = await fetch(CSV_URL + '&t=' + Date.now(), { cache: 'no-store' });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const text = await r.text();
      const rows = text.trim().split('\n').filter(r => r.trim());

      const balance = [];
      const income  = [];

      rows.forEach(row => {
        const cols = splitCSVRow(row);
        const bIcon = (cols[0] || '').replace(/^"|"$/g,'').trim();
        const bName = (cols[1] || '').replace(/^"|"$/g,'').trim();
        const bVal  = parseNum(cols[2]);

        const iIcon = (cols[4] || '').replace(/^"|"$/g,'').trim();
        const iName = (cols[5] || '').replace(/^"|"$/g,'').trim();
        const iVal  = parseNum(cols[6]);

        if (bName && !isNaN(bVal)) balance.push({ icon: bIcon, name: bName, val: bVal });
        if (iName && !isNaN(iVal)) income.push({ icon: iIcon, name: iName, val: iVal });
      });

      if (!balance.length && !income.length) throw new Error('No data found in columns A-C or E-G.');

      document.getElementById('status').style.display = 'none';
      renderBalanceList(balance);
      renderIncomeColumns(income);
    } catch(e) {
      document.getElementById('status').textContent = `⚠ ${e.message}`;
    }
  }

  load();
  setInterval(load, 60000);
</script>
</body>
</html>
