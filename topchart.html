<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Total Balance</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    width:100%; height:100%;
    background:#191919;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
    color:#fff;
  }

  .card {
    border:0px solid rgba(255,255,255,0.08);
    border-radius:20px;
    max-width:100%;
    margin:0 auto;
  }

  /* ── Header row: title + range selector ── */
  .card-top {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:0px;
  }
  .card-title {
    font-size:14px; font-weight:600; color:rgba(255,255,255,0.5);
  }
  .range-selector {
    display:flex; gap:2px;width:250px;  
    border:0px solid rgba(255,255,255,0.06);overflow-x:auto;overflow-y:hidden;
    border-radius:10px; padding: 3px 12px;;scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
  }

  .range-selector::-webkit-scrollbar{
    display:none;
}
  .range-btn {
    border:none; background:transparent; cursor:pointer;flex:0 0 auto;
    font-size:12.5px; font-weight:600; color:rgba(255,255,255,0.45);
    padding:5px 11px; border-radius:7px; transition:background 0.15s, color 0.15s;
  }

  .range-btn:hover { color:rgba(255,255,255,0.75); }
  .range-btn.active { background:rgba(255,255,255,0.1); color:#fff; }

  /* ── Balance headline ── */
  .card-balance {
    font-size:36px; font-weight:800; color:#fff; letter-spacing:-0.02em;
    margin-bottom:10px;line-height:1;
  }

  .card-balance .cents { color:rgba(255,255,255,0.4); font-weight:700; }

  .balance-group{display:inline-block;}

  .card-balance-usd{
      width:100%;
      text-align:right;
      font-size:18px;
      color:rgba(255,255,255,.45);
  }

  /* ── Sub row: gained text + pill ── */
  .card-sub-row {
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; margin-bottom:20px; flex-wrap:wrap;
  }
  .card-sub-text {
    font-size:13px; color:rgba(255,255,255,0.45); line-height:1.5; max-width:390px;
  }
  .card-sub-text .amt-hl { font-weight:700; }
  .card-sub-text .amt-hl.pos { color:#2dd4bf; }
  .card-sub-text .amt-hl.neg { color:#f87171; }

  .pill {
    display:inline-flex; align-items:center; gap:4px;
    font-size:12.5px; font-weight:700;
    padding:6px 12px; border-radius:99px; white-space:nowrap; flex-shrink:0;
  }
  .pill.pos { background:rgba(45,212,191,0.14); color:#2dd4bf; }
  .pill.neg { background:rgba(248,113,113,0.14); color:#f87171; }

  /* ── Chart ── */
  .chart-wrap { position:relative; width:100%; cursor:crosshair; }
  #chart-svg { width:100%; height:auto; display:block; overflow:visible; }

  .tooltip {
    position:absolute; pointer-events:none;
    background:#1b1b1b; border:1px solid rgba(255,255,255,0.12);
    color:#fff; font-size:12.5px; font-weight:700;
    padding:6px 11px; border-radius:8px; white-space:nowrap;
    transform:translate(-50%,-130%);
    box-shadow:0 4px 16px rgba(0,0,0,0.4);
  }
  .tooltip::after {
    content:''; position:absolute; left:50%; bottom:-5px; transform:translateX(-50%);
    width:9px; height:9px; background:#1b1b1b;
    border-right:1px solid rgba(255,255,255,0.12); border-bottom:1px solid rgba(255,255,255,0.12);
    rotate:45deg;
  }
  .tooltip .arrow { color:#2dd4bf; margin-right:2px; }
  .tooltip .arrow.neg { color:#f87171; }
  .tooltip .tt-month { font-size:10.5px; font-weight:600; color:rgba(255,255,255,0.45); margin-bottom:2px; }
  .tooltip .tt-delta { font-size:11px; font-weight:600; margin-top:2px; }
  .tooltip .tt-delta.pos { color:#2dd4bf; }
  .tooltip .tt-delta.neg { color:#f87171; }

  #loading-msg { font-size:13px; color:rgba(255,255,255,0.4); text-align:center; padding:40px 0; }

  .refresh-row {
    display:flex; align-items:center; justify-content:flex-end; gap:8px;
    
  }
  @media screen and (max-width: 400px) {
    .refresh-row {margin-top: 10px;   /* change as needed */
    }}
  @media screen and (min-width: 431px) and (max-width: 1024px) {
    .refresh-row {margin-top: 10px;   /* change as needed */
    }}

  .last-updated { font-size:11px; color:rgba(255,255,255,0.35); }
  .refresh-btn {
    border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04);
    color:rgba(255,255,255,0.6); font-size:11.5px; font-weight:600;
    padding:5px 10px; border-radius:7px; cursor:pointer;
    display:inline-flex; align-items:center; gap:5px;
    transition:background 0.15s, color 0.15s;
  }
  .refresh-btn:hover { background:rgba(255,255,255,0.09); color:#fff; }
  .refresh-btn.spinning svg { animation:refreshSpin 0.6s linear; }
  @keyframes refreshSpin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  /* ── Line filter toggle (icon-only) ── */
  .line-toggle-group {
    display:flex; align-items:center; gap:6px; flex-shrink:0;
  }
  .line-toggle-btn {
    width:28px; height:28px; padding:0; border-radius:50%;
    border:1.5px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.03);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    opacity:0.45; transition:opacity 0.15s, border-color 0.15s, background 0.15s;
  }
  .line-toggle-btn img { width:15px; height:15px; object-fit:contain; }
  .line-toggle-btn:hover { opacity:0.75; }
  .line-toggle-btn.active { opacity:1; }
  .line-toggle-btn.active[data-line="balance"] { border-color:#2dd4bf; background:rgba(45,212,191,0.12); }
  .line-toggle-btn.active[data-line="expense"] { border-color:#f472b6; background:rgba(244,114,182,0.12); }
  .line-toggle-btn.active[data-line="debt"] { border-color:#fff; background:rgba(244,114,182,0.12); }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="card-top">
    <div class="card-title"></div>
    <div class="range-selector" id="range-selector">
      <button class="range-btn" data-range="-2y">-2y</button>
      <button class="range-btn" data-range="-1y">-1y</button>
      <button class="range-btn" data-range="-6m">-6m</button>
      <button class="range-btn" data-range="-3m">-3m</button>

      <button class="range-btn active" data-range="today">Today</button>

      <button class="range-btn" data-range="+3m">+3m</button>
      <button class="range-btn" data-range="+6m">+6m</button>
      <button class="range-btn" data-range="+1y">+1y</button>
      <button class="range-btn" data-range="+2y">+2y</button>

      <button class="range-btn" data-range="max">Max</button>
    </div>
  
  </div>
  
  <div class="balance-group">
    <div class="card-balance" id="balance-val">&#x2014;</div>
    <div class="card-balance-usd" id="balance-usd"></div>
  </div>
  <div class="card-sub-row">
    <div class="card-sub-text" id="sub-text">Loading&hellip;</div>
    <div style="display:flex; align-items:center; gap:8px;">
      <div class="pill" id="change-pill" style="display:none;"></div>
      <div class="line-toggle-group" id="line-toggle-group">
        <button class="line-toggle-btn active" data-line="balance" title="Balance">
          <img src="https://github.com/tinsntp/investment/blob/main/icon/cash.png?raw=true" />
        </button>
        <button class="line-toggle-btn" data-line="expense" title="Expense">
          <img src="https://github.com/tinsntp/investment/blob/main/icon/expense.png?raw=true" />
        </button>
        <button class="line-toggle-btn" data-line="debt" title="Debt">
          <img src="https://github.com/tinsntp/investment/blob/main/icon/bank%20loan.png?raw=true" />
        </button>
      </div>
    </div>
  </div>
  <div id="loading-msg">Loading chart&hellip;</div>
  <div class="chart-wrap" id="chart-wrap" style="display:none;">
    <svg id="chart-svg" viewBox="0 0 640 300" preserveAspectRatio="none"></svg>
    <div class="tooltip" id="tooltip" style="display:none;"></div>
  </div>
  <div class="refresh-row">
    <span class="last-updated" id="last-updated"></span>
    <button class="refresh-btn" id="refresh-btn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
      Refresh
    </button>
  </div>
  
</div>

<script>
/* ══ CONFIG ══ */
var CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQnzbOhfKNO_niIpBIoReyDiy5p-UdXvtO6SIMNKXrZts9Cax9hR_5F7RqB_uejrjZuyV6N-Pjc08kd/pub?output=csv&gid=311369594";
var DEBT_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQnzbOhfKNO_niIpBIoReyDiy5p-UdXvtO6SIMNKXrZts9Cax9hR_5F7RqB_uejrjZuyV6N-Pjc08kd/pub?output=csv&gid=271989628";
var TEAL = "#2dd4bf";
var TEAL_DIM = "#14b8a6";
var RED = "#f87171";
var USD_RATE = 26300;

var PAD_LEFT = 52, PAD_RIGHT = 8, PAD_TOP = 10, PAD_BOTTOM = 24;
var VB_W = 640, VB_H = 300;

if (window.innerWidth <= 400) {   // iPhone
    VB_H = 420;

    document
        .getElementById("chart-svg")
        .setAttribute("viewBox", `0 0 ${VB_W} ${VB_H}`);
}

var fullSeries = [];   // [{date: Date, balance: number}], ascending, cumulative
var expenseSeries = []; // [{date: Date, amount: number}], aligned 1:1 with fullSeries by index — NOT cumulative
var currentRange = "today";
var lineVisibility = { balance: true, expense: false, debt: false };
var lastExpenseIndex = -1;
var debtSeries = [];

function fmtUSD(v){
    return "$" + (v / USD_RATE).toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

/* ══ CSV PARSE HELPERS ══ */
function csvRow(line) {
  var cols=[], cur="", inQ=false;
  for (var i=0;i<line.length;i++) {
    var c=line[i];
    if (c==='"') inQ=!inQ;
    else if (c===','&&!inQ) { cols.push(cur); cur=""; }
    else cur+=c;
  }
  cols.push(cur);
  return cols.map(function(s){ return s.replace(/^"|"$/g,"").trim(); });
}
function parseAmt(raw) {
  if (!raw) return NaN;
  var s = raw.trim();
  var neg = false;
  if (s.charAt(0)==="(" && s.charAt(s.length-1)===")") { neg = true; s = s.slice(1,-1); }
  s = s.replace(/[^\d,.\-]/g, ""); // strip currency symbols, letters, spaces
  if (s === "" || s === "-") return NaN;
  if (s.charAt(0) === "-") { neg = true; s = s.slice(1); }

  var lastComma = s.lastIndexOf(",");
  var lastDot = s.lastIndexOf(".");

  if (lastComma > -1 && lastDot > -1) {
    // Both separators present — whichever appears LAST is the true decimal separator
    if (lastComma > lastDot) {
      s = s.replace(/\./g, "").replace(",", "."); // dot=thousands, comma=decimal (VN/EU style)
    } else {
      s = s.replace(/,/g, ""); // comma=thousands, dot=decimal (US style)
    }
  } else if (lastComma > -1) {
    var afterComma = s.length - lastComma - 1;
    var commaCount = (s.match(/,/g)||[]).length;
    if (commaCount === 1 && afterComma <= 2) {
      s = s.replace(",", "."); // single comma w/ 1-2 digits after = decimal comma
    } else {
      s = s.replace(/,/g, ""); // otherwise commas are thousands separators
    }
  } else if (lastDot > -1) {
    var afterDot = s.length - lastDot - 1;
    var dotCount = (s.match(/\./g)||[]).length;
    if (!(dotCount === 1 && afterDot <= 2)) {
      s = s.replace(/\./g, ""); // multiple dots, or 3+ digits after = thousands separators (VN style)
    }
    // else: single dot w/ 1-2 digits after = a genuine decimal, leave as-is
  }

  var v = parseFloat(s);
  if (isNaN(v)) return NaN;
  return neg ? -v : v;
}

function parseSheetDate(raw) {
  if (!raw) return null;
  var s = raw.trim();
  // ISO format: YYYY-MM-DD (unambiguous, use directly)
  var iso = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (iso) return new Date(parseInt(iso[1]), parseInt(iso[2])-1, parseInt(iso[3]));

  // Slash/dash separated: D/M/YYYY — Vietnamese sheets default to DAY/MONTH/YEAR,
  // NOT the US month/day/year that JS's native Date() assumes.
  var dmy = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
  if (dmy) {
    var a = parseInt(dmy[1]), b = parseInt(dmy[2]), y = parseInt(dmy[3]);
    var day = a, month = b;
    if (a <= 12 && b > 12) { day = b; month = a; } // only swap if the DMY reading is impossible
    return new Date(y, month-1, day);
  }

  var d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

/* Parses a "MM/YY" or "MM/YYYY" style month-year label, e.g. "07/26" or "07/2026" */
function parseMonthYear(raw) {
  if (!raw) return null;
  var s = raw.trim();
  var m = s.match(/^(\d{1,2})[\/\-](\d{2,4})$/);
  if (!m) return null;
  var month = parseInt(m[1]) - 1;
  if (month < 0 || month > 11) return null;
  var yearPart = m[2];
  var year = yearPart.length <= 2 ? 2000 + parseInt(yearPart) : parseInt(yearPart);
  return new Date(year, month, 1);
}

function fmtFull(v) {
  var sign = v<0 ? "\u2212" : "";
  return sign + "\u20ab" + Math.round(Math.abs(v)).toLocaleString("en-US");
}
function fmtAxis(v) {
  var a = Math.abs(v), sign = v<0 ? "-" : "";
  if (a>=1e9) return sign+(a/1e9).toFixed(1)+"B";
  if (a>=1e6) return sign+(a/1e6).toFixed(1)+"M";
  if (a>=1e3) return sign+Math.round(a/1e3)+"K";
  return sign+Math.round(a);
}
function monthShort(d){ return ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()]; }
function monthYearLabel(d){ return monthShort(d)+" "+d.getFullYear(); }

/* ══ LOAD + BUILD CUMULATIVE MONTHLY SERIES ══ */
function loadBalanceHistory() {
  Promise.all([
    fetch(CSV_URL+"&t="+Date.now(), {cache:"no-store"})
      .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); }),
    fetch(DEBT_CSV_URL + "&t=" + Date.now(), { cache: "no-store" })
        .then(r => {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.text();
        })
    ]).then(function(results){
      var balanceText = results[0];
      var debtText = results[1];
      
      var lines = balanceText.split("\n").filter(function(l){
        return l.trim();
    });

    var rows = lines.map(csvRow);

      // Column I (index 8) holds the group names to EXCLUDE (e.g. "Social Account")
      var excluded = {};
      rows.forEach(function(cols){
        var v = (cols[8]||"").trim();
        if (v) excluded[v.toLowerCase()] = true;
      });

      // Columns K(10)=Date, L(11)=Group, M(12)=Amt — aggregated by MONTH, not day
      var byMonth = {};   // "YYYY-M" -> summed delta for that month
      var monthObjs = {}; // "YYYY-M" -> Date (1st of that month)

      rows.forEach(function(cols){
        var dateStr = cols[10]||"";
        var group   = (cols[11]||"").trim();
        var amt     = parseAmt(cols[12]||"");
        if (!dateStr) return;
        var d = parseSheetDate(dateStr);
        if (!d) return;
        if (isNaN(amt)) return;
        if (group && excluded[group.toLowerCase()]) return; // skip excluded groups

        var key = d.getFullYear()+"-"+d.getMonth();
        if (!byMonth[key]) { byMonth[key]=0; monthObjs[key]=new Date(d.getFullYear(), d.getMonth(), 1); }
        byMonth[key] += amt;
      });

      // Columns Q(16)=MM/YY, R(17)=Amt, S(18)=Amt — both R and S are monthly totals
      // tied to the same Q month label, merged into the same byMonth buckets as
      // the dated ledger above (not tied to a specific day).
      rows.forEach(function(cols){
        var qStr = cols[16]||"";
        if (!qStr) return;
        var qd = parseMonthYear(qStr);
        if (!qd) return;
        var key = qd.getFullYear()+"-"+qd.getMonth();

        var rAmt = parseAmt(cols[17]||"");
        var sAmt = parseAmt(cols[19]||"");
        if (isNaN(rAmt) && isNaN(sAmt)) return;

        if (!byMonth[key]) { byMonth[key]=0; monthObjs[key]=new Date(qd.getFullYear(), qd.getMonth(), 1); }
        if (!isNaN(rAmt)) byMonth[key] += rAmt;
        if (!isNaN(sAmt)) byMonth[key] += sAmt;
      });

      // Column R (17) ALONE, keyed by the same Q(16) month label — this becomes
      // its own separate "Expense" line, NOT merged into the balance, and NOT
      // cumulative (each point is just that month's total from R).
      var byMonthExpense = {}; // "YYYY-M" -> summed R for that month (independent of balance/S)
      rows.forEach(function(cols){
        var qStr = cols[16]||"";
        if (!qStr) return;
        var qd = parseMonthYear(qStr);
        if (!qd) return;
        var rAmt = parseAmt(cols[17]||"");
        if (isNaN(rAmt)) return;
        var key = qd.getFullYear()+"-"+qd.getMonth();
        if (!byMonthExpense[key]) byMonthExpense[key] = 0;
        byMonthExpense[key] += rAmt;
      });
      
      
      var keys = Object.keys(byMonth).sort(function(a,b){ return monthObjs[a]-monthObjs[b]; });
      var running = 0;
      fullSeries = keys.map(function(k){
        running += byMonth[k];
        return { date: monthObjs[k], balance: running, delta: byMonth[k] };
      });

      // expenseSeries stays aligned 1:1 (same index/order) with fullSeries — months
      // with no R entry just show 0, so the two lines always share x positions.
      expenseSeries = keys.map(function(k){
        return { date: monthObjs[k], amount: Math.abs(byMonthExpense[k]||0) };
      });

      lastExpenseIndex = -1;
      for (let i = expenseSeries.length - 1; i >= 0; i--) {
      if (expenseSeries[i].amount > 0) {
          lastExpenseIndex = i;
          break;
      }   
      };

    // -------------------------
    // Parse debt sheet
    // -------------------------

    var debtLines = debtText.split("\n").filter(function(l){
        return l.trim();
    });

    var debtRows = debtLines.map(csvRow);

    // Skip header
    debtRows = debtRows.slice(1);

    var debtByMonth = {};

    debtRows.forEach(function(cols){
        var raw = cols[0].trim();
        var m = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
if (!m) return;

var month = parseInt(m[1], 10);
var day   = parseInt(m[2], 10);
var year  = parseInt(m[3], 10);

var d = new Date(year, month - 1, day);
        if (!d) return;

        var key = d.getFullYear() + "-" + d.getMonth();

        var shinhan = parseAmt(cols[2]);
        var sc       = parseAmt(cols[1]);

        if (isNaN(shinhan)) shinhan = 0;
        if (isNaN(sc)) sc = 0;

        debtByMonth[key] = {
            sc: sc,
            shinhan: shinhan
            
        };
        
    });

    debtSeries = keys.map(function(k){

        var debt = debtByMonth[k] || {
            sc: 0,
            shinhan: 0
        };
        

        return {
            date: monthObjs[k],
            total: debt.shinhan + debt.sc,
            sc: debt.sc,
            shinhan: debt.shinhan

        };

      });
  

      document.getElementById("loading-msg").style.display = "none";
      document.getElementById("chart-wrap").style.display = "block";
      renderChart(currentRange);

      var now2 = new Date();
      var hh = String(now2.getHours()).padStart(2,"0");
      var mm = String(now2.getMinutes()).padStart(2,"0");
      var ss = String(now2.getSeconds()).padStart(2,"0");
      document.getElementById("last-updated").textContent = "Updated "+hh+":"+mm+":"+ss;
    })
    .catch(function(err){
      document.getElementById("loading-msg").textContent = "Error: "+err.message;
    });
    const todayBtn = document.querySelector(
    '.range-btn[data-range="today"]'
);

todayBtn.scrollIntoView({
    behavior: "auto",
    inline: "center",
    block: "nearest"
});
}

/* ══ RANGE FILTERING (by month-count, since points are now one-per-month) ══ */
var RANGE_MONTHS = { "-2y": -24,"-1y": -12,"-6m": -6,"-3m": -3,"today": 0,"+3m":3, "+6m":6, "+1y":12, "+2y":24, "max":null };
var RANGE_LABELS = { "-2y":"2 years","-1y":"1 year","-6m":"6 months","-3m":"3 months","+3m":"3 months", "+6m":"6 months", "+1y":"1 year", "+2y":"2 years", "max":"all time" };

function filterByRange(range) { if (!fullSeries.length) return []; // Max = everything
 if (range === "max") {
 return fullSeries.slice();
 }
 var months = RANGE_MONTHS[range]; var today = new Date();
 var start = new Date(today.getFullYear(), today.getMonth()-3, 1); var end = new Date(today.getFullYear(), today.getMonth() + months, 1); return fullSeries.filter(function (p) { return p.date >= start && p.date <= end; });
 }

/* ══ SMOOTH PATH BUILDER (simple cubic bezier smoothing) ══ */
function buildSmoothPath(pts) {
  if (pts.length < 2) return { line:"", area:"" };
  var d = "M "+pts[0].x+" "+pts[0].y;
  for (var i=0; i<pts.length-1; i++) {
    var p0 = pts[i], p1 = pts[i+1];
    var cx = (p0.x+p1.x)/2;

function getCurrentMonthIndex() {
    if (!currentXY.length) return 0;

    var now = new Date();
    var year = now.getFullYear();
    var month = now.getMonth();

    var idx = 0;

    for (var i = 0; i < currentXY.length; i++) {
        var d = currentXY[i].date;

        if (
            d.getFullYear() < year ||
            (d.getFullYear() === year && d.getMonth() <= month)
        ) {
            idx = i;
        } else {
            break;
        }
    }

    return idx;
}

function getDefaultHoverIndex() {
    var currentIdx = getCurrentMonthIndex();

    // Expense-only view: pin to the current month, never a future one.
    if (lineVisibility.expense && !lineVisibility.balance) {
        return Math.min(currentXY.length - 1, currentIdx);
    }

    // Balance visible (alone or alongside expense): keep existing behavior,
    // previewing 6 months ahead by default.
    return Math.min(
        currentXY.length - 1,
        currentIdx + 6
    );
}

/* ══ HOVER: show crosshair + tooltip at a given point index ══ */
function showPointAt(idx) {
  if (!currentXY.length) return;
  idx = Math.max(0, Math.min(currentXY.length-1, idx));
  var pt = currentXY[idx];
  var ptExp =
idx <= lastExpenseIndex
    ? currentExpenseXY[idx]
    : null;

  var hoverLine = document.getElementById("hover-line");
  var hoverDot = document.getElementById("hover-dot");
  var hoverDotExp = document.getElementById("hover-dot-expense");
  if (hoverLine) { hoverLine.setAttribute("x1", pt.x); hoverLine.setAttribute("x2", pt.x); }

  if (hoverDot) {
    if (lineVisibility.balance) {
      hoverDot.setAttribute("cx", pt.x); hoverDot.setAttribute("cy", pt.y);
      hoverDot.style.display = "";
    } else { hoverDot.style.display = "none"; }
  }
  if (hoverDotExp) {
    if (lineVisibility.expense && ptExp) {
      hoverDotExp.setAttribute("cx", ptExp.x); hoverDotExp.setAttribute("cy", ptExp.y);
      hoverDotExp.style.display = "";
    } else { hoverDotExp.style.display = "none"; }
  }

  var tooltip = document.getElementById("tooltip");
  var wrapRect = document.getElementById("chart-wrap").getBoundingClientRect();
  var scaleX = wrapRect.width / VB_W, scaleY = wrapRect.height / VB_H;
  tooltip.style.display = "block";
  tooltip.style.left = (pt.x * scaleX) + "px";
  // anchor tooltip above whichever visible point is higher up (smaller y)
  var anchorY;

if (lineVisibility.expense && !lineVisibility.balance && !lineVisibility.debt) {
    // Expense only
    anchorY = ptExp ? ptExp.y : pt.y;

} else if (lineVisibility.debt && !lineVisibility.balance && !lineVisibility.expense) {
    // Debt only
    anchorY = Math.min(
        currentDebtTotalXY[idx].y,
        currentDebtShinhanXY[idx].y,
        currentDebtSCXY[idx].y
    );

} else {
    // Mixed mode
    anchorY = pt.y;

    if (lineVisibility.expense && ptExp)
        anchorY = Math.min(anchorY, ptExp.y);

    if (lineVisibility.debt) {
        anchorY = Math.min(
            anchorY,
            currentDebtTotalXY[idx].y,
            currentDebtShinhanXY[idx].y,
            currentDebtSCXY[idx].y
        );
    }
}

tooltip.style.top = (anchorY * scaleY) + "px";

// If only debt is selected, ignore hidden balance completely.
if (
    lineVisibility.debt &&
    !lineVisibility.balance &&
    !lineVisibility.expense
) {
    anchorY = currentDebtTotalXY[idx].y -55;
}
  tooltip.style.top = (anchorY * scaleY) + "px";

  var html = '<div class="tt-month">'+monthYearLabel(pt.date)+'</div>';

  if (lineVisibility.balance) {
    var deltaIsPos = pt.momDelta >= 0;
    var deltaTxt = (deltaIsPos ? "+" : "\u2212") + fmtFull(Math.abs(pt.momDelta));
    html += '<div>'+fmtFull(pt.balance)+'</div>'+
      '<div class="tt-delta '+(deltaIsPos?"pos":"neg")+'">'+(deltaIsPos?"&#9650;":"&#9660;")+' '+deltaTxt+' vs last month</div>';
  }
  if (lineVisibility.expense && ptExp) {
    var expDeltaIsPos = ptExp.momDelta >= 0;
    var expDeltaTxt = (expDeltaIsPos ? "+" : "\u2212") + fmtFull(Math.abs(ptExp.momDelta));
    html += '<div style="margin-top:'+(lineVisibility.balance?"6px":"0")+';color:#f472b6;">'+fmtFull(ptExp.amount)+' expense</div>'+
      '<div class="tt-delta" style="color:'+(expDeltaIsPos?"#f87171":"#2dd4bf")+';">'+(expDeltaIsPos?"&#9650;":"&#9660;")+' '+expDeltaTxt+' vs last month</div>';
  }
  if (lineVisibility.debt) {

    function fmtShort(v) {
        var a = Math.abs(v);
        var sign = v < 0 ? "-" : "";

        if (a >= 1e9) return sign + (a / 1e9).toFixed(1).replace(/\.0$/, "") + "B";
        if (a >= 1e6) return sign + Math.round(a / 1e6) + "M";
        if (a >= 1e3) return sign + Math.round(a / 1e3) + "K";
        return sign + Math.round(a);

/* ══ MOUSE / TOUCH HOVER HANDLING ══ */
(function() {
  var chartWrap = document.getElementById("chart-wrap");

  function nearestIndexFromClientX(clientX) {
    var rect = chartWrap.getBoundingClientRect();
    var relX = clientX - rect.left;
    var svgX = (relX / rect.width) * VB_W;
    var plotW = VB_W - PAD_LEFT - PAD_RIGHT;
    var frac = (svgX - PAD_LEFT) / plotW;
    frac = Math.max(0, Math.min(1, frac));
    return Math.round(frac * (currentXY.length-1));
  }

  chartWrap.addEventListener("mousemove", function(e){
    if (!currentXY.length) return;
    showPointAt(nearestIndexFromClientX(e.clientX));
  });
  chartWrap.addEventListener("mouseleave", function(){
    if (currentXY.length) showPointAt(getDefaultHoverIndex()); // revert to "current" point
  });

  chartWrap.addEventListener("touchstart", function(e){
    if (!currentXY.length) return;
    showPointAt(nearestIndexFromClientX(e.touches[0].clientX));
  }, { passive:true });
  chartWrap.addEventListener("touchmove", function(e){
    if (!currentXY.length) return;
    showPointAt(nearestIndexFromClientX(e.touches[0].clientX));
  }, { passive:true });
})();

    this.classList.toggle("active", lineVisibility[line]);
    if (fullSeries.length) renderChart(currentRange);
  });
});
